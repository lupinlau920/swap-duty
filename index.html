<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>醫院調更管理系統 - QR掃描版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <!-- 引入 QR Code 生成與掃描庫 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .tab-active { border-bottom: 4px solid #2563eb; color: #2563eb; font-weight: 900; }
        
        #alertModal, #passwordModal, #shareModal, #importModal, #scanModal {
            display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center; padding: 1rem;
        }

        .date-field-group { position: relative; cursor: pointer; width: 100%; }
        .real-date-picker { position: absolute; bottom: 0; left: 50%; width: 0; height: 0; opacity: 0; pointer-events: none; }

        .fake-input {
            width: 100%; height: 3.5rem; background: white; border: 1px solid #e2e8f0; border-radius: 0.75rem;
            display: flex; align-items: center; padding: 0 1rem; font-size: 0.875rem; color: #64748b; transition: all 0.2s;
        }
        
        .date-field-group:active .fake-input { background-color: #f1f5f9; border-color: #3b82f6; }
        
        .badge-shift { @apply px-2 py-0.5 rounded text-xs font-black text-white; }
        
        .list-enter { animation: slideIn 0.3s ease-out forwards; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #qrcode canvas, #qrcode img { margin: 0 auto; border: 8px solid white; border-radius: 12px; }
    </style>
</head>
<body class="min-h-screen pb-12">

    <!-- 導航欄 -->
    <nav class="bg-white shadow-sm border-b sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 flex justify-between h-16 items-center">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-xl shadow-lg shadow-blue-100">
                    <i data-lucide="shuffle" class="text-white w-6 h-6"></i>
                </div>
                <span class="text-xl font-black text-gray-800 tracking-tight">醫院調更系統</span>
            </div>
            <div class="flex gap-2 h-full">
                <button onclick="switchTab('apply')" id="tabApply" class="px-4 md:px-6 flex items-center tab-active transition-all text-sm md:text-base">提交申請</button>
                <button onclick="requestAdminAccess()" id="tabAdmin" class="px-4 md:px-6 flex items-center text-gray-500 hover:text-blue-600 transition-all relative text-sm md:text-base font-bold">
                    主管批核 
                    <span id="pendingBadge" class="absolute top-3 right-0 hidden bg-red-500 text-white text-[10px] px-1.5 py-0.5 rounded-full border-2 border-white font-bold">0</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-8">
        <!-- 提交申請頁面 -->
        <section id="sectionApply" class="animate-in fade-in duration-500">
            <div class="max-w-2xl mx-auto bg-white rounded-3xl shadow-sm border p-6 md:p-8">
                <div class="flex items-center gap-2 mb-8">
                    <span class="w-2 h-8 bg-blue-600 rounded-full"></span>
                    <h2 class="text-2xl font-black text-gray-800">建立新調更申請</h2>
                </div>
                <form id="swapForm" class="space-y-8">
                    <!-- 申請人區塊 -->
                    <div class="p-6 bg-blue-50/50 rounded-2xl space-y-5 border border-blue-100 relative">
                        <div class="absolute -top-3 left-6 bg-blue-600 text-white text-[10px] px-4 py-1.5 rounded-full font-bold uppercase tracking-widest shadow-sm">本人 / 申請人</div>
                        <div class="grid grid-cols-2 gap-4">
                            <input type="text" id="reqName" required class="w-full px-5 py-4 border border-blue-200 rounded-xl text-base outline-none focus:ring-2 focus:ring-blue-400 bg-white" placeholder="您的姓名">
                            <select id="reqPos" required class="w-full px-4 py-3 border border-blue-200 rounded-xl text-sm bg-white font-bold text-gray-700 outline-none">
                                <option value="" disabled selected>職位</option>
                                <option value="APN">APN</option><option value="RN">RN</option><option value="EA">EA</option><option value="PCA">PCA</option>
                            </select>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="space-y-1">
                                <label class="text-[10px] font-bold text-blue-400 ml-1">原本更期</label>
                                <select id="reqOldShift" required class="w-full px-4 py-3 border border-blue-200 rounded-xl text-sm bg-white font-bold text-gray-600 outline-none">
                                    <option value="A">A (早更)</option><option value="P">P (午更)</option><option value="N">N (夜更)</option><option value="O">O (放假)</option>
                                    <option value="D">D (全日)</option><option value="VL">VL (年假)</option>
                                </select>
                            </div>
                            <div class="space-y-1">
                                <label class="text-[10px] font-bold text-blue-600 ml-1">調換後更期</label>
                                <select id="reqNewShift" required class="w-full px-4 py-3 border border-blue-400 rounded-xl text-sm bg-white font-bold text-blue-600 outline-none shadow-sm">
                                    <option value="A">A (早更)</option><option value="P">P (午更)</option><option value="N">N (夜更)</option><option value="O">O (放假)</option>
                                    <option value="D">D (全日)</option><option value="VL">VL (年假)</option>
                                </select>
                            </div>
                        </div>
                        <div class="date-field-group" onclick="triggerDatePicker('picker_reqDate')">
                            <div class="fake-input" id="disp_reqDate">選擇調更日期 (日/月/年)</div>
                            <input type="date" id="picker_reqDate" class="real-date-picker" onchange="updateDisplay(this, 'disp_reqDate')">
                        </div>
                    </div>

                    <!-- 對調同事區塊 -->
                    <div class="p-6 bg-orange-50/50 rounded-2xl space-y-5 border border-orange-100 relative mt-6">
                        <div class="absolute -top-3 left-6 bg-orange-500 text-white text-[10px] px-4 py-1.5 rounded-full font-bold uppercase tracking-widest shadow-sm">對調同事</div>
                        <div class="grid grid-cols-2 gap-4">
                            <input type="text" id="partName" required class="w-full px-5 py-4 border border-orange-200 rounded-xl text-base outline-none focus:ring-2 focus:ring-orange-400 bg-white" placeholder="對象姓名">
                            <select id="partPos" required class="w-full px-4 py-3 border border-orange-200 rounded-xl text-sm bg-white font-bold text-gray-700 outline-none">
                                <option value="" disabled selected>職位</option>
                                <option value="APN">APN</option><option value="RN">RN</option><option value="EA">EA</option><option value="PCA">PCA</option>
                            </select>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="space-y-1">
                                <label class="text-[10px] font-bold text-orange-400 ml-1">原本更期</label>
                                <select id="partOldShift" required class="w-full px-4 py-3 border border-orange-200 rounded-xl text-sm bg-white font-bold text-gray-600 outline-none">
                                    <option value="A">A (早更)</option><option value="P">P (午更)</option><option value="N">N (夜更)</option><option value="O">O (放假)</option>
                                    <option value="D">D (全日)</option><option value="VL">VL (年假)</option>
                                </select>
                            </div>
                            <div class="space-y-1">
                                <label class="text-[10px] font-bold text-orange-600 ml-1">調換後更期</label>
                                <select id="partNewShift" required class="w-full px-4 py-3 border border-orange-400 rounded-xl text-sm bg-white font-bold text-orange-600 outline-none shadow-sm">
                                    <option value="A">A (早更)</option><option value="P">P (午更)</option><option value="N">N (夜更)</option><option value="O">O (放假)</option>
                                    <option value="D">D (全日)</option><option value="VL (年假)">VL (年假)</option>
                                </select>
                            </div>
                        </div>
                        <div class="date-field-group" onclick="triggerDatePicker('picker_partDate')">
                            <div class="fake-input" id="disp_partDate">選擇對象調更日期 (日/月/年)</div>
                            <input type="date" id="picker_partDate" class="real-date-picker" onchange="updateDisplay(this, 'disp_partDate')">
                        </div>
                    </div>

                    <button type="submit" class="w-full bg-gray-900 hover:bg-black text-white font-black py-5 rounded-2xl shadow-xl transition-all active:scale-[0.98] text-lg flex items-center justify-center gap-2">
                        <i data-lucide="qr-code" class="w-5 h-5"></i>
                        生成 QR Code 並發送
                    </button>
                </form>
            </div>
        </section>

        <!-- 主管批核頁面 -->
        <section id="sectionAdmin" class="hidden animate-in slide-in-from-bottom duration-500">
            <div class="bg-white rounded-3xl shadow-sm border overflow-hidden">
                <div class="p-6 border-b flex justify-between items-center bg-white flex-wrap gap-4">
                    <h2 class="text-xl font-black text-gray-800 flex items-center gap-2">
                        <i data-lucide="shield-check" class="text-blue-600"></i>
                        批核中心 <span class="text-xs font-normal text-gray-400 ml-2">(本地儲存)</span>
                    </h2>
                    <div class="flex gap-2 w-full md:w-auto">
                        <button onclick="exportToExcel()" class="flex-1 md:flex-none bg-emerald-600 text-white text-xs font-bold px-4 py-3 rounded-xl hover:bg-emerald-700 flex items-center justify-center gap-1 shadow-lg shadow-emerald-100">
                            <i data-lucide="file-spreadsheet" class="w-4 h-4"></i> 導出 Excel
                        </button>
                        <button onclick="openScanModal()" class="flex-1 md:flex-none bg-orange-600 text-white text-xs font-bold px-4 py-3 rounded-xl hover:bg-orange-700 flex items-center justify-center gap-1 shadow-lg shadow-orange-100">
                            <i data-lucide="scan-line" class="w-4 h-4"></i> 掃描 QR
                        </button>
                        <button onclick="openImportModal()" class="flex-1 md:flex-none bg-blue-600 text-white text-xs font-bold px-4 py-3 rounded-xl hover:bg-blue-700 flex items-center justify-center gap-1 shadow-lg shadow-blue-100">
                            <i data-lucide="plus-circle" class="w-4 h-4"></i> 匯入代碼
                        </button>
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left" id="adminTableElement">
                        <thead class="bg-gray-50 text-gray-400 text-[10px] uppercase font-black tracking-widest">
                            <tr>
                                <th class="px-6 py-4">申請人資訊</th>
                                <th class="px-6 py-4 text-right">對調同事</th>
                                <th class="px-6 py-4 text-center">狀態/操作</th>
                            </tr>
                        </thead>
                        <tbody id="adminDataTable" class="divide-y divide-gray-100 text-sm"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <!-- Modals -->
    <div id="shareModal">
        <div class="bg-white p-8 rounded-3xl w-full max-w-md shadow-2xl text-center">
            <div class="mx-auto mb-4 bg-blue-100 text-blue-600 w-12 h-12 rounded-full flex items-center justify-center"><i data-lucide="qr-code" class="w-6 h-6"></i></div>
            <h3 class="text-2xl font-black mb-1">申請已準備就緒</h3>
            <p class="text-gray-500 text-sm mb-6">請展示 QR Code 給主管掃描，或傳送代碼</p>
            
            <!-- QR Code 容器 -->
            <div id="qrcode" class="mb-6 flex justify-center"></div>

            <div class="bg-gray-50 p-3 rounded-xl border border-dashed border-gray-300 mb-6 overflow-hidden">
                <code id="shareCodeText" class="text-[8px] break-all text-blue-600 font-mono block max-h-16 overflow-y-auto"></code>
            </div>

            <div class="grid grid-cols-2 gap-2">
                <button onclick="copyShareCode()" class="py-4 bg-gray-100 text-gray-800 rounded-xl font-black flex items-center justify-center gap-2 text-sm"><i data-lucide="copy" class="w-4 h-4"></i> 複製代碼</button>
                <button onclick="whatsappShare()" class="py-4 bg-emerald-500 text-white rounded-xl font-black flex items-center justify-center gap-2 text-sm"><i data-lucide="message-circle" class="w-4 h-4"></i> 傳送代碼</button>
            </div>
            <button onclick="closeShareModal()" class="w-full mt-4 py-2 text-gray-400 font-bold text-xs">返回修改</button>
        </div>
    </div>

    <div id="scanModal">
        <div class="bg-white p-6 rounded-3xl w-full max-w-md shadow-2xl text-center">
            <h3 class="text-xl font-black mb-4">掃描申請 QR Code</h3>
            <div id="reader" class="w-full overflow-hidden rounded-2xl bg-black aspect-square mb-4"></div>
            <button onclick="closeScanModal()" class="w-full py-4 bg-gray-100 rounded-xl font-bold">取消掃描</button>
        </div>
    </div>

    <div id="importModal">
        <div class="bg-white p-8 rounded-3xl w-full max-w-sm shadow-2xl">
            <h3 class="text-xl font-black mb-4">手動匯入申請</h3>
            <textarea id="importArea" class="w-full border p-4 rounded-xl mb-4 outline-none focus:ring-2 focus:ring-blue-500 h-40 text-[10px] font-mono" placeholder="在此貼上加密代碼..."></textarea>
            <div class="flex gap-2">
                <button onclick="closeImportModal()" class="flex-1 py-3 bg-gray-100 rounded-xl font-bold">取消</button>
                <button onclick="processImport(document.getElementById('importArea').value)" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold">確認匯入</button>
            </div>
        </div>
    </div>

    <div id="passwordModal">
        <div class="bg-white p-8 rounded-3xl w-full max-w-sm shadow-2xl">
            <h3 class="text-xl font-black mb-4">管理員驗證</h3>
            <input type="password" id="adminPassword" class="w-full border p-4 rounded-xl mb-4 outline-none focus:ring-2 focus:ring-blue-500" placeholder="密碼 (1234)">
            <div class="flex gap-2">
                <button onclick="closePasswordModal()" class="flex-1 py-3 bg-gray-100 rounded-xl font-bold">取消</button>
                <button onclick="verifyPassword()" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold">進入</button>
            </div>
        </div>
    </div>

    <div id="alertModal">
        <div class="bg-white p-8 rounded-3xl w-full max-w-sm shadow-2xl text-center">
            <h3 id="alertTitle" class="text-xl font-black mb-2"></h3>
            <p id="alertDesc" class="text-gray-500 mb-6 text-sm"></p>
            <button onclick="closeAlert()" class="w-full py-4 bg-gray-900 text-white rounded-xl font-black">確定</button>
        </div>
    </div>

    <script>
        lucide.createIcons();
        let allRequests = JSON.parse(localStorage.getItem('local_duty_data_v4')) || [];
        let currentShareCode = "";
        let html5QrCode = null;

        window.triggerDatePicker = (p) => { const el = document.getElementById(p); if(el.showPicker) el.showPicker(); else el.click(); };
        window.updateDisplay = (p, d) => {
            const val = p.value; if(!val) return;
            const [y, m, d_val] = val.split('-');
            const el = document.getElementById(d);
            el.innerText = `${d_val}/${m}/${y}`; el.style.color = "#1e293b"; el.style.fontWeight = "bold";
            el.parentElement.style.borderColor = "#3b82f6";
        };

        document.getElementById('swapForm').onsubmit = (e) => {
            e.preventDefault();
            const d1 = document.getElementById('disp_reqDate').innerText;
            const d2 = document.getElementById('disp_partDate').innerText;
            if (d1.includes('選擇') || d2.includes('選擇')) { showAlert("日期未選", "請選擇日期。"); return; }

            const data = {
                id: Date.now() + Math.random(),
                reqName: document.getElementById('reqName').value,
                reqPos: document.getElementById('reqPos').value,
                reqOldShift: document.getElementById('reqOldShift').value,
                reqNewShift: document.getElementById('reqNewShift').value,
                reqDate: d1,
                partName: document.getElementById('partName').value,
                partPos: document.getElementById('partPos').value,
                partOldShift: document.getElementById('partOldShift').value,
                partNewShift: document.getElementById('partNewShift').value,
                partDate: d2,
                status: '待批核',
                timestamp: new Date().toLocaleString()
            };

            currentShareCode = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
            
            // 生成 QR Code
            document.getElementById("qrcode").innerHTML = "";
            new QRCode(document.getElementById("qrcode"), {
                text: currentShareCode,
                width: 200,
                height: 200,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.L
            });

            document.getElementById('shareCodeText').innerText = currentShareCode;
            document.getElementById('shareModal').style.display = 'flex';
            e.target.reset(); resetDateUI();
        };

        function resetDateUI() {
            document.getElementById('disp_reqDate').innerText = "選擇調更日期 (日/月/年)";
            document.getElementById('disp_partDate').innerText = "選擇對象調更日期 (日/月/年)";
            document.querySelectorAll('.fake-input').forEach(i => { i.style.color = "#64748b"; i.style.fontWeight="normal"; i.parentElement.style.borderColor="#e2e8f0"; });
        }

        // 掃描相關
        window.openScanModal = () => {
            document.getElementById('scanModal').style.display = 'flex';
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };
            html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
                closeScanModal();
                processImport(decodedText);
            }).catch(err => {
                showAlert("相機錯誤", "無法啟動相機。請確保已授權。");
                closeScanModal();
            });
        };

        window.closeScanModal = () => {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('scanModal').style.display = 'none';
                    html5QrCode = null;
                }).catch(() => {
                    document.getElementById('scanModal').style.display = 'none';
                });
            } else {
                document.getElementById('scanModal').style.display = 'none';
            }
        };

        window.processImport = (code) => {
            code = code.trim();
            if(!code) return;
            try {
                const data = JSON.parse(decodeURIComponent(escape(atob(code))));
                if (!allRequests.find(r => r.id === data.id)) {
                    allRequests.unshift(data);
                    saveAndRender();
                    closeImportModal();
                    showAlert("匯入成功", `${data.reqName} 的申請已加入清單。`);
                } else {
                    showAlert("重複", "該筆申請已在清單中。");
                }
            } catch (err) { showAlert("錯誤", "無效的代碼或 QR Code。"); }
        };

        window.exportToExcel = () => {
            if (allRequests.length === 0) { showAlert("無資料", "沒有申請記錄。"); return; }
            const exportData = allRequests.map(r => ({
                "狀態": r.status, "時間": r.timestamp, "申請人": r.reqName, "職位": r.reqPos, "日期": r.reqDate, "原更": r.reqOldShift, "新更": r.reqNewShift,
                "對調人": r.partName, "對調人日期": r.partDate, "對調人原更": r.partOldShift, "對調人新更": r.partNewShift
            }));
            const ws = XLSX.utils.json_to_sheet(exportData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "調更申請");
            XLSX.writeFile(wb, `調更報表_${new Date().toLocaleDateString()}.xlsx`);
        };

        function saveAndRender() {
            localStorage.setItem('local_duty_data_v4', JSON.stringify(allRequests));
            renderAdminTable();
            updateBadge();
        }

        window.renderAdminTable = () => {
            const tbody = document.getElementById('adminDataTable');
            if (allRequests.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" class="py-20 text-center text-gray-300 font-bold">暫無申請</td></tr>';
                return;
            }
            tbody.innerHTML = allRequests.map(r => `
                <tr class="hover:bg-blue-50/30 border-b list-enter">
                    <td class="px-6 py-5">
                        <div class="flex items-center gap-2 font-black">${r.reqName} <span class="text-[10px] bg-blue-100 text-blue-600 px-1 rounded">${r.reqPos}</span></div>
                        <div class="text-[10px] text-gray-400 font-bold">${r.reqDate} (${r.reqOldShift}→${r.reqNewShift})</div>
                    </td>
                    <td class="px-6 py-5 text-right">
                        <div class="flex items-center justify-end gap-2 font-black">${r.partName} <span class="text-[10px] bg-orange-100 text-orange-600 px-1 rounded">${r.partPos}</span></div>
                        <div class="text-[10px] text-gray-400 font-bold">${r.partDate} (${r.partOldShift}→${r.partNewShift})</div>
                    </td>
                    <td class="px-6 py-5 text-center">
                        <span class="text-[10px] font-black ${r.status === '已批准' ? 'text-emerald-500' : (r.status === '已拒絕' ? 'text-red-500' : 'text-gray-400')}">${r.status}</span>
                        <div class="mt-2 flex justify-center gap-2">
                            ${r.status === '待批核' ? `
                                <button onclick="updateStatus(${r.id}, '已批准')" class="p-2 bg-emerald-50 text-emerald-600 rounded-lg"><i data-lucide="check" class="w-3 h-3"></i></button>
                                <button onclick="updateStatus(${r.id}, '已拒絕')" class="p-2 bg-red-50 text-red-600 rounded-lg"><i data-lucide="x" class="w-3 h-3"></i></button>
                            ` : `<button onclick="deleteRow(${r.id})" class="text-gray-300 hover:text-red-500 p-1"><i data-lucide="trash-2" class="w-4 h-4"></i></button>`}
                        </div>
                    </td>
                </tr>
            `).join('');
            lucide.createIcons();
        };

        window.copyShareCode = () => {
            const el = document.createElement('textarea'); el.value = currentShareCode;
            document.body.appendChild(el); el.select(); document.execCommand('copy');
            document.body.removeChild(el); showAlert("已複製", "可傳送給主管手動匯入。");
        };

        window.whatsappShare = () => {
            const text = encodeURIComponent(`【調更申請】\n代碼：\n${currentShareCode}`);
            window.open(`https://wa.me/?text=${text}`, '_blank');
        };

        window.updateStatus = (id, s) => { allRequests = allRequests.map(r => r.id === id ? {...r, status: s} : r); saveAndRender(); };
        window.deleteRow = (id) => { if(confirm("刪除這筆記錄？")) { allRequests = allRequests.filter(r => r.id !== id); saveAndRender(); } };
        window.switchTab = (t) => {
            document.getElementById('sectionApply').classList.toggle('hidden', t !== 'apply');
            document.getElementById('sectionAdmin').classList.toggle('hidden', t === 'apply');
            document.getElementById('tabApply').classList.toggle('tab-active', t === 'apply');
            document.getElementById('tabAdmin').classList.toggle('tab-active', t !== 'apply');
        };
        window.requestAdminAccess = () => document.getElementById('passwordModal').style.display = 'flex';
        window.closePasswordModal = () => document.getElementById('passwordModal').style.display = 'none';
        window.verifyPassword = () => { if (document.getElementById('adminPassword').value === "1234") { closePasswordModal(); switchTab('admin'); } else { alert("密碼錯誤"); } };
        window.updateBadge = () => { const count = allRequests.filter(r => r.status === '待批核').length; const b = document.getElementById('pendingBadge'); b.innerText = count; b.classList.toggle('hidden', count === 0); };
        window.showAlert = (t, d) => { document.getElementById('alertTitle').innerText = t; document.getElementById('alertDesc').innerText = d; document.getElementById('alertModal').style.display = 'flex'; };
        window.closeAlert = () => document.getElementById('alertModal').style.display = 'none';
        window.closeShareModal = () => document.getElementById('shareModal').style.display = 'none';
        window.openImportModal = () => document.getElementById('importModal').style.display = 'flex';
        window.closeImportModal = () => document.getElementById('importModal').style.display = 'none';

        document.addEventListener('DOMContentLoaded', () => { renderAdminTable(); updateBadge(); });
    </script>
</body>
</html>
