<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>醫院調更管理系統 - 極限辨識版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .tab-active { border-bottom: 4px solid #2563eb; color: #2563eb; font-weight: 900; }
        
        #passwordModal, #shareModal, #scanModal, #statusModal {
            display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px); z-index: 1000; align-items: center; justify-content: center; padding: 1.5rem;
        }

        /* 強化 QR Code 顯示區域 */
        #qrcode-container {
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 0 40px rgba(0,0,0,0.1);
            display: inline-block;
        }
        #qrcode { 
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #qrcode img { 
            image-rendering: pixelated; /* 讓像素邊緣更銳利 */
            border: 4px solid white;
        }
    </style>
</head>
<body class="min-h-screen pb-12">

    <nav class="bg-white shadow-sm border-b sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 flex justify-between h-16 items-center">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 p-1.5 rounded-lg">
                    <i data-lucide="hospital" class="text-white w-5 h-5"></i>
                </div>
                <span class="text-lg font-black text-gray-800">調更系統 v3.1</span>
            </div>
            <div class="flex gap-1 h-full">
                <button onclick="switchTab('apply')" id="tabApply" class="px-3 flex items-center tab-active text-sm">申請</button>
                <button onclick="requestAdminAccess()" id="tabAdmin" class="px-3 flex items-center text-gray-500 text-sm font-bold relative">
                    批核 <span id="pendingBadge" class="absolute top-3 right-0 hidden bg-red-500 text-white text-[9px] px-1.5 py-0.5 rounded-full">0</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4">
        <!-- 頂部快速操作 -->
        <section id="sectionApply" class="space-y-4">
            <div onclick="openScanModal('status')" class="bg-blue-600 p-5 rounded-2xl text-white flex justify-between items-center shadow-lg active:scale-95 transition-all">
                <div class="flex items-center gap-4">
                    <i data-lucide="search" class="w-8 h-8 opacity-80"></i>
                    <div>
                        <div class="font-black text-lg">查詢申請進度</div>
                        <div class="text-xs opacity-70">掃描 QR Code 查看批核狀態</div>
                    </div>
                </div>
                <i data-lucide="chevron-right"></i>
            </div>

            <div class="bg-white rounded-3xl shadow-md p-6 border border-slate-200">
                <h2 class="text-xl font-black mb-6">填寫調更資料</h2>
                <form id="swapForm" class="space-y-6">
                    <div class="bg-slate-50 p-4 rounded-2xl space-y-3">
                        <div class="flex items-center gap-2 mb-2 text-blue-600 font-black text-sm border-b pb-2 border-blue-100">
                            <i data-lucide="user" class="w-4 h-4"></i> 申請人
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <input type="text" id="reqName" required placeholder="姓名" class="p-3 rounded-xl border-none ring-1 ring-slate-200 text-sm">
                            <select id="reqPos" class="p-3 rounded-xl border-none ring-1 ring-slate-200 text-sm">
                                <option>RN</option><option>APN</option><option>EA</option><option>PCA</option>
                            </select>
                        </div>
                        <div class="grid grid-cols-3 gap-2">
                            <select id="reqOldShift" class="p-2 rounded-lg text-xs bg-white ring-1 ring-slate-200"><option>原: A</option><option>原: P</option><option>原: N</option><option>原: O</option></select>
                            <div class="flex items-center justify-center"><i data-lucide="arrow-right" class="w-4 h-4 text-slate-300"></i></div>
                            <select id="reqNewShift" class="p-2 rounded-lg text-xs bg-blue-50 text-blue-700 ring-1 ring-blue-200 font-bold"><option>換: A</option><option>換: P</option><option>換: N</option><option>換: O</option></select>
                        </div>
                        <input type="date" id="reqDate" required class="w-full p-3 rounded-xl border-none ring-1 ring-slate-200 text-sm">
                    </div>

                    <div class="bg-slate-50 p-4 rounded-2xl space-y-3">
                        <div class="flex items-center gap-2 mb-2 text-orange-600 font-black text-sm border-b pb-2 border-orange-100">
                            <i data-lucide="users" class="w-4 h-4"></i> 對調同事
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <input type="text" id="partName" required placeholder="姓名" class="p-3 rounded-xl border-none ring-1 ring-slate-200 text-sm">
                            <select id="partPos" class="p-3 rounded-xl border-none ring-1 ring-slate-200 text-sm">
                                <option>RN</option><option>APN</option><option>EA</option><option>PCA</option>
                            </select>
                        </div>
                        <div class="grid grid-cols-3 gap-2">
                            <select id="partOldShift" class="p-2 rounded-lg text-xs bg-white ring-1 ring-slate-200"><option>原: A</option><option>原: P</option><option>原: N</option><option>原: O</option></select>
                            <div class="flex items-center justify-center"><i data-lucide="arrow-right" class="w-4 h-4 text-slate-300"></i></div>
                            <select id="partNewShift" class="p-2 rounded-lg text-xs bg-orange-50 text-orange-700 ring-1 ring-orange-200 font-bold"><option>換: A</option><option>換: P</option><option>換: N</option><option>換: O</option></select>
                        </div>
                        <input type="date" id="partDate" required class="w-full p-3 rounded-xl border-none ring-1 ring-slate-200 text-sm">
                    </div>

                    <button type="submit" class="w-full bg-slate-900 text-white font-black py-5 rounded-2xl shadow-xl active:scale-95 transition-all text-lg">
                        生成申請二維碼
                    </button>
                </form>
            </div>
        </section>

        <section id="sectionAdmin" class="hidden space-y-4">
            <div class="flex justify-between items-center px-2">
                <h2 class="text-xl font-black">批核清單</h2>
                <div class="flex gap-2">
                    <button onclick="exportToExcel()" class="bg-white p-3 rounded-xl shadow-sm border border-slate-200"><i data-lucide="download" class="w-5 h-5 text-slate-600"></i></button>
                    <button onclick="openScanModal('import')" class="bg-blue-600 text-white px-4 py-2 rounded-xl font-bold flex items-center gap-2">
                        <i data-lucide="plus-circle" class="w-5 h-5"></i> 掃描申請
                    </button>
                </div>
            </div>
            <div id="adminDataTable" class="space-y-4"></div>
        </section>
    </main>

    <!-- Modals -->
    <div id="shareModal">
        <div class="bg-white p-6 rounded-3xl w-full max-w-sm text-center">
            <h3 class="text-xl font-black mb-1">您的申請碼</h3>
            <p class="text-xs text-slate-400 mb-6 font-bold">請確保螢幕亮度足夠，讓主管掃描</p>
            
            <div id="qrcode-container">
                <div id="qrcode"></div>
            </div>
            
            <div class="grid grid-cols-2 gap-3 mt-8 mb-4">
                <button onclick="copyShareCode()" class="py-3 bg-slate-100 rounded-xl font-black text-sm">複製代碼</button>
                <button onclick="whatsappShare()" class="py-3 bg-emerald-500 text-white rounded-xl font-black text-sm">WhatsApp</button>
            </div>
            <button onclick="closeShareModal()" class="text-slate-400 font-bold text-sm">關閉</button>
        </div>
    </div>

    <div id="scanModal">
        <div class="bg-white p-4 rounded-3xl w-full max-w-md">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-black">掃描二維碼</h3>
                <button onclick="closeScanModal()"><i data-lucide="x" class="text-slate-400"></i></button>
            </div>
            <div id="reader" class="w-full aspect-square bg-black rounded-2xl overflow-hidden mb-4"></div>
            <div class="text-center text-xs text-slate-400 font-bold py-2">
                請將 QR Code 置於框內，保持 10-15 公分距離
            </div>
        </div>
    </div>

    <div id="statusModal">
        <div class="bg-white p-8 rounded-3xl w-full max-w-sm text-center">
            <div id="statusIcon" class="mx-auto mb-4 w-16 h-16 rounded-full flex items-center justify-center"></div>
            <h3 id="statusTitle" class="text-2xl font-black mb-4"></h3>
            <div id="statusDetails" class="text-sm bg-slate-50 p-4 rounded-2xl mb-6 space-y-1 text-left font-medium"></div>
            <button onclick="closeStatusModal()" class="w-full py-4 bg-slate-900 text-white rounded-xl font-black">確認</button>
        </div>
    </div>

    <div id="passwordModal">
        <div class="bg-white p-6 rounded-3xl w-full max-w-xs text-center">
            <h3 class="font-black mb-4">管理員驗證</h3>
            <input type="password" id="adminPassword" class="w-full p-4 bg-slate-100 rounded-xl mb-4 text-center text-xl tracking-widest" placeholder="密碼">
            <button onclick="verifyPassword()" class="w-full py-4 bg-blue-600 text-white rounded-xl font-black">進入批核</button>
        </div>
    </div>

    <script>
        lucide.createIcons();

        let allRequests = JSON.parse(localStorage.getItem('duty_v10_data')) || [];
        let html5QrCode = null;

        // 【極致簡化映射】
        const shortMap = { id:'i', reqName:'n1', reqPos:'p1', reqOldShift:'o1', reqNewShift:'w1', reqDate:'d1', partName:'n2', partPos:'p2', partOldShift:'o2', partNewShift:'w2', partDate:'d2', status:'s' };

        const compress = (o) => {
            let s = "{";
            for(let k in o) s += `"${shortMap[k]}":"${o[k]}",`;
            s = s.slice(0,-1) + "}";
            return btoa(unescape(encodeURIComponent(s))).replace(/=/g, "");
        };

        const decompress = (str) => {
            const raw = decodeURIComponent(escape(atob(str)));
            const obj = JSON.parse(raw);
            const res = {};
            for(let k in obj) {
                const fullKey = Object.keys(shortMap).find(key => shortMap[key] === k);
                res[fullKey] = obj[k];
            }
            return res;
        };

        document.getElementById('swapForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const data = {
                id: Date.now().toString(36).toUpperCase(),
                reqName: document.getElementById('reqName').value,
                reqPos: document.getElementById('reqPos').value,
                reqOldShift: document.getElementById('reqOldShift').value.split(': ')[1],
                reqNewShift: document.getElementById('reqNewShift').value.split(': ')[1],
                reqDate: document.getElementById('reqDate').value.slice(5),
                partName: document.getElementById('partName').value,
                partPos: document.getElementById('partPos').value,
                partOldShift: document.getElementById('partOldShift').value.split(': ')[1],
                partNewShift: document.getElementById('partNewShift').value.split(': ')[1],
                partDate: document.getElementById('partDate').value.slice(5),
                status: '待批'
            };

            const code = compress(data);
            window.currentShareCode = code;
            
            const qrDiv = document.getElementById("qrcode");
            qrDiv.innerHTML = "";
            
            // 【優化】使用更低容錯 Level L 以獲得更稀疏、更容易被模糊鏡頭辨識的點陣
            new QRCode(qrDiv, { 
                text: code, 
                width: 220, 
                height: 220,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.L 
            });
            
            document.getElementById('shareModal').style.display = 'flex';
        });

        window.openScanModal = (mode) => {
            window.currentScanMode = mode;
            document.getElementById('scanModal').style.display = 'flex';
            
            // 【掃描強化】指定掃描區域與格式
            html5QrCode = new Html5Qrcode("reader");
            const config = { 
                fps: 20, 
                qrbox: { width: 220, height: 220 },
                formatsToSupport: [ Html5QrcodeSupportedFormats.QR_CODE ]
            };

            html5QrCode.start({ facingMode: "environment" }, config, (text) => {
                html5QrCode.stop().then(() => {
                    document.getElementById('scanModal').style.display = 'none';
                    handleResult(text);
                });
            }).catch(err => alert("相機啟動失敗"));
        };

        function handleResult(text) {
            try {
                const data = decompress(text);
                if (window.currentScanMode === 'import') {
                    if (!allRequests.some(r => r.id === data.id)) {
                        allRequests.unshift(data);
                        save();
                        alert("匯入申請成功");
                    } else alert("已存在相同申請");
                } else {
                    showStatus(data);
                }
            } catch (e) { alert("無法辨識此系統格式"); }
        }

        function showStatus(scanned) {
            const found = allRequests.find(r => r.id === scanned.id);
            const icon = document.getElementById('statusIcon');
            const details = document.getElementById('statusDetails');
            
            if (!found) {
                icon.className = "mx-auto mb-4 w-16 h-16 rounded-full flex items-center justify-center bg-slate-100 text-slate-400";
                icon.innerHTML = '<i data-lucide="help-circle" class="w-8 h-8"></i>';
                document.getElementById('statusTitle').innerText = "查無申請";
                details.innerHTML = "<li>主管尚未掃描此申請</li><li>或此申請已被管理員刪除</li>";
            } else {
                const colors = { '已批': 'bg-emerald-100 text-emerald-600', '拒絕': 'bg-red-100 text-red-600', '待批': 'bg-blue-100 text-blue-600' };
                icon.className = `mx-auto mb-4 w-16 h-16 rounded-full flex items-center justify-center ${colors[found.status] || 'bg-slate-100'}`;
                icon.innerHTML = `<i data-lucide="${found.status==='已批'?'check':(found.status==='拒絕'?'x':'clock')}" class="w-8 h-8"></i>`;
                document.getElementById('statusTitle').innerText = found.status;
                details.innerHTML = `
                    <div class="flex justify-between"><span>申請人:</span><b>${found.reqName}</b></div>
                    <div class="flex justify-between"><span>對調人:</span><b>${found.partName}</b></div>
                    <div class="flex justify-between"><span>日期:</span><b>${found.reqDate}</b></div>
                `;
            }
            lucide.createIcons();
            document.getElementById('statusModal').style.display = 'flex';
        }

        window.save = () => { localStorage.setItem('duty_v10_data', JSON.stringify(allRequests)); render(); updateBadge(); };
        
        window.render = () => {
            const container = document.getElementById('adminDataTable');
            container.innerHTML = allRequests.map(r => `
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center">
                    <div class="space-y-1">
                        <div class="font-black text-slate-800">${r.reqName} ↔ ${r.partName}</div>
                        <div class="text-xs text-slate-400 font-bold">${r.reqDate} / ${r.partDate}</div>
                        <div class="text-[10px] inline-block px-2 py-0.5 rounded-full ${r.status==='已批'?'bg-emerald-100 text-emerald-600':'bg-blue-100 text-blue-600'}">${r.status}</div>
                    </div>
                    <div class="flex gap-2">
                        ${r.status === '待批' ? `
                            <button onclick="act('${r.id}','已批')" class="bg-emerald-500 text-white p-3 rounded-xl"><i data-lucide="check" class="w-4 h-4"></i></button>
                            <button onclick="act('${r.id}','拒絕')" class="bg-red-500 text-white p-3 rounded-xl"><i data-lucide="x" class="w-4 h-4"></i></button>
                        ` : `<button onclick="del('${r.id}')" class="text-slate-300 p-2"><i data-lucide="trash-2" class="w-5 h-5"></i></button>`}
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        };

        window.act = (id, s) => { allRequests = allRequests.map(r => r.id === id ? {...r, status: s} : r); save(); };
        window.del = (id) => { if(confirm("刪除？")) { allRequests = allRequests.filter(r => r.id !== id); save(); } };
        window.switchTab = (t) => {
            document.getElementById('sectionApply').classList.toggle('hidden', t !== 'apply');
            document.getElementById('sectionAdmin').classList.toggle('hidden', t === 'apply');
            document.getElementById('tabApply').classList.toggle('tab-active', t === 'apply');
            document.getElementById('tabAdmin').classList.toggle('tab-active', t !== 'apply');
        };
        window.requestAdminAccess = () => document.getElementById('passwordModal').style.display = 'flex';
        window.verifyPassword = () => { 
            if (document.getElementById('adminPassword').value === "1234") { 
                document.getElementById('passwordModal').style.display='none'; 
                switchTab('admin'); 
            } else alert("密碼錯誤"); 
        };
        window.updateBadge = () => { 
            const count = allRequests.filter(r => r.status === '待批').length; 
            const b = document.getElementById('pendingBadge'); 
            b.innerText = count; b.classList.toggle('hidden', count === 0); 
        };
        window.closeScanModal = () => { if (html5QrCode) html5QrCode.stop().then(() => { document.getElementById('scanModal').style.display='none'; }); else document.getElementById('scanModal').style.display='none'; };
        window.closeShareModal = () => document.getElementById('shareModal').style.display = 'none';
        window.closeStatusModal = () => document.getElementById('statusModal').style.display = 'none';
        window.copyShareCode = () => { navigator.clipboard.writeText(window.currentShareCode); alert("已複製代碼"); };
        window.whatsappShare = () => { window.open(`https://wa.me/?text=${encodeURIComponent('調更代碼：' + window.currentShareCode)}`); };
        window.exportToExcel = () => { 
            const ws = XLSX.utils.json_to_sheet(allRequests); 
            const wb = XLSX.utils.book_new(); 
            XLSX.utils.book_append_sheet(wb, ws, "Records"); 
            XLSX.writeFile(wb, `DutySwap.xlsx`); 
        };

        document.addEventListener('DOMContentLoaded', () => { render(); updateBadge(); });
    </script>
</body>
</html>
