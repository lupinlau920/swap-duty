<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>醫院調更管理系統 - 同步備份版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .tab-active { border-bottom: 4px solid #2563eb; color: #2563eb; font-weight: 900; }
        
        #passwordModal, #shareModal, #scanModal, #statusModal, #syncModal {
            display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px); z-index: 1000; align-items: center; justify-content: center; padding: 1.5rem;
        }

        .sync-loading { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen pb-12">

    <nav class="bg-white shadow-sm border-b sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 flex justify-between h-16 items-center">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 p-1.5 rounded-lg">
                    <i data-lucide="hospital" class="text-white w-5 h-5"></i>
                </div>
                <span class="text-lg font-black text-gray-800">調更系統 v4.0</span>
            </div>
            <div class="flex gap-1 h-full">
                <button onclick="switchTab('apply')" id="tabApply" class="px-3 flex items-center tab-active text-sm">申請</button>
                <button onclick="requestAdminAccess()" id="tabAdmin" class="px-3 flex items-center text-gray-500 text-sm font-bold relative">
                    批核 <span id="pendingBadge" class="absolute top-3 right-0 hidden bg-red-500 text-white text-[9px] px-1.5 py-0.5 rounded-full">0</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4">
        <!-- 申請部分 (保持不變) -->
        <section id="sectionApply" class="space-y-4">
            <div onclick="openScanModal('status')" class="bg-blue-600 p-5 rounded-2xl text-white flex justify-between items-center shadow-lg active:scale-95 transition-all cursor-pointer">
                <div class="flex items-center gap-4">
                    <i data-lucide="search" class="w-8 h-8 opacity-80"></i>
                    <div>
                        <div class="font-black text-lg">查詢申請進度</div>
                        <div class="text-xs opacity-70">掃描 QR Code 查看批核狀態</div>
                    </div>
                </div>
                <i data-lucide="chevron-right"></i>
            </div>

            <div class="bg-white rounded-3xl shadow-md p-6 border border-slate-200">
                <h2 class="text-xl font-black mb-6 text-slate-800">填寫調更資料</h2>
                <form id="swapForm" class="space-y-6">
                    <div class="bg-slate-50 p-4 rounded-2xl space-y-3 border-l-4 border-blue-500">
                        <div class="flex items-center gap-2 mb-2 text-blue-600 font-black text-sm border-b pb-2 border-blue-100">
                            <i data-lucide="user" class="w-4 h-4"></i> 申請人 (本人)
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <input type="text" id="reqName" required placeholder="姓名" class="p-3 rounded-xl border-none ring-1 ring-slate-200 text-sm">
                            <select id="reqPos" class="p-3 rounded-xl border-none ring-1 ring-slate-200 text-sm"><option>RN</option><option>APN</option><option>EA</option><option>PCA</option></select>
                        </div>
                        <div class="grid grid-cols-3 gap-2">
                            <select id="reqOldShift" class="p-2 rounded-lg text-xs ring-1 ring-slate-200"><option value="A">A</option><option value="P">P</option><option value="N">N</option><option value="O">O</option></select>
                            <div class="flex items-center justify-center"><i data-lucide="arrow-right" class="w-4 h-4 text-slate-300"></i></div>
                            <select id="reqNewShift" class="p-2 rounded-lg text-xs bg-blue-50 ring-1 ring-blue-200 font-bold"><option value="A">A</option><option value="P">P</option><option value="N">N</option><option value="O">O</option></select>
                        </div>
                        <input type="date" id="reqDate" required onchange="syncDates(this.value)" class="w-full p-3 rounded-xl border-none ring-1 ring-slate-200 text-sm">
                    </div>

                    <div class="bg-slate-50 p-4 rounded-2xl space-y-3 border-l-4 border-orange-500">
                        <div class="flex items-center gap-2 mb-2 text-orange-600 font-black text-sm border-b pb-2 border-orange-100">
                            <i data-lucide="users" class="w-4 h-4"></i> 對調同事
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <input type="text" id="partName" required placeholder="姓名" class="p-3 rounded-xl border-none ring-1 ring-slate-200 text-sm">
                            <select id="partPos" class="p-3 rounded-xl border-none ring-1 ring-slate-200 text-sm"><option>RN</option><option>APN</option><option>EA</option><option>PCA</option></select>
                        </div>
                        <div class="grid grid-cols-3 gap-2">
                            <select id="partOldShift" class="p-2 rounded-lg text-xs ring-1 ring-slate-200"><option value="A">A</option><option value="P">P</option><option value="N">N</option><option value="O">O</option></select>
                            <div class="flex items-center justify-center"><i data-lucide="arrow-right" class="w-4 h-4 text-slate-300"></i></div>
                            <select id="partNewShift" class="p-2 rounded-lg text-xs bg-orange-50 ring-1 ring-orange-200 font-bold"><option value="A">A</option><option value="P">P</option><option value="N">N</option><option value="O">O</option></select>
                        </div>
                        <input type="date" id="partDate" required class="w-full p-3 rounded-xl border-none ring-1 ring-slate-200 text-sm bg-slate-100" readonly>
                    </div>

                    <button type="submit" class="w-full bg-slate-900 text-white font-black py-5 rounded-2xl shadow-xl active:scale-95 transition-all text-lg">生成申請 QR Code</button>
                </form>
            </div>
        </section>

        <!-- 管理員部分 -->
        <section id="sectionAdmin" class="hidden space-y-4">
            <!-- 數據同步工具欄 -->
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
                <div class="flex items-center justify-between mb-3">
                    <h3 class="font-black text-slate-800 text-sm flex items-center gap-2">
                        <i data-lucide="database" class="w-4 h-4 text-blue-600"></i> 數據備份與同步
                    </h3>
                    <span id="lastSyncTime" class="text-[9px] text-slate-400 font-bold">未同步</span>
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="exportJSON()" class="flex flex-col items-center justify-center p-3 bg-slate-50 rounded-xl border border-slate-100 active:bg-slate-100">
                        <i data-lucide="file-down" class="w-5 h-5 text-blue-600 mb-1"></i>
                        <span class="text-[10px] font-black text-slate-600">導出 JSON</span>
                    </button>
                    <button onclick="document.getElementById('importFile').click()" class="flex flex-col items-center justify-center p-3 bg-slate-50 rounded-xl border border-slate-100 active:bg-slate-100">
                        <i data-lucide="file-up" class="w-5 h-5 text-orange-600 mb-1"></i>
                        <span class="text-[10px] font-black text-slate-600">匯入 JSON</span>
                        <input type="file" id="importFile" class="hidden" accept=".json" onchange="importJSON(this)">
                    </button>
                    <button onclick="openSyncModal()" class="flex flex-col items-center justify-center p-3 bg-blue-600 text-white rounded-xl shadow-md active:scale-95 transition-all">
                        <i data-lucide="refresh-cw" class="w-5 h-5 mb-1"></i>
                        <span class="text-[10px] font-black">手動雲端同步</span>
                    </button>
                </div>
            </div>

            <div class="flex justify-between items-center px-2">
                <h2 class="text-xl font-black">批核清單</h2>
                <div class="flex gap-2">
                    <button onclick="exportToExcel()" class="bg-white p-3 rounded-xl border border-slate-200 active:bg-slate-50"><i data-lucide="download" class="w-5 h-5 text-slate-600"></i></button>
                    <button onclick="openScanModal('import')" class="bg-blue-600 text-white px-4 py-2 rounded-xl font-bold flex items-center gap-2 active:scale-95">
                        <i data-lucide="scan-line" class="w-5 h-5"></i> 掃描匯入
                    </button>
                </div>
            </div>
            <div id="adminDataTable" class="space-y-4"></div>
            <div id="emptyState" class="text-center py-12 hidden">
                <i data-lucide="clipboard-list" class="w-12 h-12 text-slate-300 mx-auto mb-2"></i>
                <p class="text-slate-400 text-sm font-bold">目前暫無申請記錄</p>
            </div>
        </section>
    </main>

    <!-- 同步彈窗 (手動雲端系統) -->
    <div id="syncModal">
        <div class="bg-white p-6 rounded-3xl w-full max-w-sm">
            <h3 class="text-xl font-black mb-2 flex items-center gap-2">
                <i data-lucide="cloud" class="text-blue-600"></i> 雲端手動備份
            </h3>
            <p class="text-xs text-slate-400 font-bold mb-6 italic">將本地數據加密上傳至臨時雲端，並產生同步碼供其他裝置恢復。</p>
            
            <div class="space-y-4">
                <div class="p-4 bg-blue-50 rounded-2xl border border-blue-100">
                    <div class="text-[10px] font-black text-blue-400 mb-2 uppercase tracking-widest">備份數據</div>
                    <button id="uploadBtn" onclick="cloudUpload()" class="w-full py-3 bg-blue-600 text-white rounded-xl font-black text-sm flex items-center justify-center gap-2 shadow-lg">
                        <i data-lucide="upload" class="w-4 h-4"></i> 上傳並獲取同步碼
                    </button>
                    <div id="syncCodeResult" class="hidden mt-3 text-center">
                        <div class="text-[10px] font-bold text-slate-400 mb-1">您的同步碼 (24小時有效)：</div>
                        <div id="syncCodeText" class="text-xl font-black tracking-widest text-blue-700 select-all">---</div>
                    </div>
                </div>

                <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                    <div class="text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest">恢復數據</div>
                    <div class="flex gap-2">
                        <input type="text" id="restoreCode" class="flex-grow p-3 rounded-xl border-none ring-1 ring-slate-200 text-center font-mono text-sm" placeholder="輸入同步碼">
                        <button onclick="cloudRestore()" class="px-4 bg-slate-900 text-white rounded-xl font-black text-sm">恢復</button>
                    </div>
                </div>
            </div>
            
            <button onclick="closeModal('syncModal')" class="w-full mt-6 text-slate-400 font-bold text-sm">取消</button>
        </div>
    </div>

    <!-- 其他 Modals (原有邏輯) -->
    <div id="shareModal"><div class="bg-white p-6 rounded-3xl w-full max-w-sm text-center"><h3 class="text-xl font-black mb-6">申請 QR Code</h3><div id="qrcode" class="mb-8 flex justify-center"></div><button onclick="copyShareCode()" class="w-full py-4 bg-emerald-500 text-white rounded-xl font-black mb-3">複製代碼</button><button onclick="closeModal('shareModal')" class="text-slate-400 font-bold">關閉</button></div></div>
    <div id="scanModal"><div class="bg-white p-5 rounded-3xl w-full max-w-md"><div id="reader" class="w-full aspect-square bg-black rounded-2xl mb-4"></div><button onclick="closeModal('scanModal')" class="w-full py-3 bg-slate-100 rounded-xl font-bold">關閉</button></div></div>
    <div id="passwordModal"><div class="bg-white p-6 rounded-3xl w-full max-w-xs text-center"><h3 class="font-black mb-4">管理員驗證</h3><input type="password" id="adminPassword" class="w-full p-4 bg-slate-100 rounded-xl mb-4 text-center text-xl" placeholder="密碼 1234"><button onclick="verifyPassword()" class="w-full py-4 bg-blue-600 text-white rounded-xl font-black">進入批核</button></div></div>
    <div id="statusModal"><div class="bg-white p-8 rounded-3xl w-full max-w-sm text-center"><div id="statusIcon" class="mx-auto mb-4 w-16 h-16 rounded-full flex items-center justify-center"></div><h3 id="statusTitle" class="text-2xl font-black mb-2"></h3><div id="statusDetails" class="text-sm bg-slate-50 p-4 rounded-xl mb-6 text-left"></div><button onclick="closeModal('statusModal')" class="w-full py-4 bg-slate-900 text-white rounded-xl font-black">確認</button></div></div>

    <script>
        lucide.createIcons();
        let allRequests = JSON.parse(localStorage.getItem('duty_v10_data')) || [];
        let html5QrCode = null;
        const shortMap = { id:'i', reqName:'n1', reqPos:'p1', reqOldShift:'o1', reqNewShift:'w1', reqDate:'d1', partName:'n2', partPos:'p2', partOldShift:'o2', partNewShift:'w2', partDate:'d2', status:'s' };

        // 同步工具邏輯
        window.syncDates = (v) => document.getElementById('partDate').value = v;

        // JSON 導出
        window.exportJSON = () => {
            const dataStr = JSON.stringify(allRequests, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `DutySwap_Backup_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
        };

        // JSON 匯入
        window.importJSON = (input) => {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (Array.isArray(imported)) {
                        if (confirm(`確定要匯入 ${imported.length} 筆資料嗎？這將與現有資料合併。`)) {
                            // 合併去重
                            const existingIds = new Set(allRequests.map(r => r.id));
                            const newItems = imported.filter(r => !existingIds.has(r.id));
                            allRequests = [...newItems, ...allRequests];
                            save();
                            alert(`成功匯入 ${newItems.length} 筆新申請！`);
                        }
                    } else alert("無效的 JSON 格式");
                } catch (err) { alert("讀取檔案失敗"); }
                input.value = "";
            };
            reader.readAsText(file);
        };

        // 手動雲端同步系統 (使用匿名 JSON 存儲服務 MyJson.online 或類似模擬)
        // 這裡展示如何透過 API 手動達成「暫存-獲取碼-恢復」流程
        window.cloudUpload = async () => {
            const btn = document.getElementById('uploadBtn');
            const resultArea = document.getElementById('syncCodeResult');
            const codeText = document.getElementById('syncCodeText');
            
            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="refresh-cw" class="w-4 h-4 sync-loading"></i> 上傳中...';
            lucide.createIcons();

            try {
                // 使用匿名服務 https://api.jsonbin.io/v3/b (範例性質)
                // 為了展示邏輯，我們將資料打包成一個對象
                const response = await fetch('https://api.jsonbin.io/v3/b', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Bin-Private': 'false' // 設為公開 bin 以便僅靠 ID 訪問
                    },
                    body: JSON.stringify({ data: allRequests, timestamp: Date.now() })
                });
                
                const result = await response.json();
                if (result.metadata && result.metadata.id) {
                    const binId = result.metadata.id;
                    codeText.innerText = binId;
                    resultArea.classList.remove('hidden');
                    document.getElementById('lastSyncTime').innerText = "雲端備份成功 " + new Date().toLocaleTimeString();
                }
            } catch (err) {
                alert("上傳失敗，請檢查網絡連線");
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i data-lucide="upload" class="w-4 h-4"></i> 上傳並獲取同步碼';
                lucide.createIcons();
            }
        };

        window.cloudRestore = async () => {
            const code = document.getElementById('restoreCode').value.trim();
            if (!code) return alert("請輸入同步碼");

            if (!confirm("恢復雲端資料將與本地資料合併，確定繼續？")) return;

            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${code}/latest`);
                const result = await response.json();
                
                if (result.record && Array.isArray(result.record.data)) {
                    const imported = result.record.data;
                    const existingIds = new Set(allRequests.map(r => r.id));
                    const newItems = imported.filter(r => !existingIds.has(r.id));
                    allRequests = [...newItems, ...allRequests];
                    save();
                    alert(`同步成功！已從雲端恢復 ${newItems.length} 筆新資料。`);
                    closeModal('syncModal');
                } else {
                    alert("同步碼無效或資料已過期");
                }
            } catch (err) {
                alert("同步失敗，請確認代碼是否正確");
            }
        };

        // 壓縮/解壓 (原有邏輯)
        const compress = (o) => {
            let s = "{";
            for(let k in o) s += `"${shortMap[k]}":"${o[k]}",`;
            s = s.slice(0,-1) + "}";
            return btoa(unescape(encodeURIComponent(s))).replace(/=/g, "");
        };
        const decompress = (str) => {
            try {
                let base64 = str.trim();
                while (base64.length % 4 !== 0) base64 += '=';
                const obj = JSON.parse(decodeURIComponent(escape(atob(base64))));
                const res = {};
                for(let k in obj) res[Object.keys(shortMap).find(key => shortMap[key] === k)] = obj[k];
                return res;
            } catch (e) { return null; }
        };

        // 核心功能
        window.save = () => { localStorage.setItem('duty_v10_data', JSON.stringify(allRequests)); render(); updateBadge(); };
        window.render = () => {
            const container = document.getElementById('adminDataTable');
            const empty = document.getElementById('emptyState');
            if (allRequests.length === 0) { container.innerHTML = ""; empty.classList.remove('hidden'); return; }
            empty.classList.add('hidden');
            container.innerHTML = allRequests.map(r => `
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center active:bg-slate-50 transition-all select-none">
                    <div class="space-y-1">
                        <div class="font-black text-slate-800">${r.reqName} ↔ ${r.partName}</div>
                        <div class="text-[10px] text-slate-400 font-bold">${r.reqDate} (換更：${r.reqOldShift}➔${r.reqNewShift})</div>
                        <div class="text-[10px] inline-block px-2 py-0.5 rounded-full mt-1 ${r.status==='已批'?'bg-emerald-100 text-emerald-600':(r.status==='拒絕'?'bg-red-100 text-red-600':'bg-blue-100 text-blue-600')} font-black">${r.status}</div>
                    </div>
                    <div class="flex gap-2">
                        ${r.status === '待批' ? `
                            <button onclick="act('${r.id}','已批')" class="bg-emerald-500 text-white p-3 rounded-xl active:scale-90"><i data-lucide="check" class="w-4 h-4"></i></button>
                            <button onclick="act('${r.id}','拒絕')" class="bg-red-500 text-white p-3 rounded-xl active:scale-90"><i data-lucide="x" class="w-4 h-4"></i></button>
                        ` : `<button onclick="del('${r.id}')" class="text-slate-300 p-2"><i data-lucide="trash-2" class="w-5 h-5"></i></button>`}
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        };

        // 介面導航
        window.switchTab = (t) => {
            document.getElementById('sectionApply').classList.toggle('hidden', t !== 'apply');
            document.getElementById('sectionAdmin').classList.toggle('hidden', t === 'apply');
            document.getElementById('tabApply').classList.toggle('tab-active', t === 'apply');
            document.getElementById('tabAdmin').classList.toggle('tab-active', t !== 'apply');
        };
        window.requestAdminAccess = () => document.getElementById('passwordModal').style.display = 'flex';
        window.verifyPassword = () => { 
            if (document.getElementById('adminPassword').value === "1234") { 
                document.getElementById('passwordModal').style.display='none'; switchTab('admin'); 
            } else alert("密碼錯誤"); 
        };
        window.closeModal = (id) => {
            if(id === 'scanModal' && html5QrCode) html5QrCode.stop();
            document.getElementById(id).style.display = 'none';
        };
        window.openSyncModal = () => document.getElementById('syncModal').style.display = 'flex';
        
        // 掃描匯入
        window.openScanModal = (mode) => {
            window.currentScanMode = mode;
            document.getElementById('scanModal').style.display = 'flex';
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 220 }, (text) => {
                html5QrCode.stop().then(() => { 
                    document.getElementById('scanModal').style.display = 'none'; 
                    const data = decompress(text);
                    if (!data) return alert("無效代碼");
                    if (mode === 'import') {
                        if (!allRequests.some(r => r.id === data.id)) {
                            allRequests.unshift(data); save(); alert("已匯入");
                        } else alert("已存在");
                    } else showStatus(data);
                });
            });
        };

        window.act = (id, s) => { allRequests = allRequests.map(r => r.id === id ? {...r, status: s} : r); save(); };
        window.del = (id) => { if(confirm("確定刪除？")) { allRequests = allRequests.filter(r => r.id !== id); save(); } };
        window.updateBadge = () => { 
            const count = allRequests.filter(r => r.status === '待批').length; 
            const b = document.getElementById('pendingBadge'); 
            b.innerText = count; b.classList.toggle('hidden', count === 0); 
        };

        document.getElementById('swapForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const data = {
                id: Date.now().toString(36).toUpperCase(),
                reqName: document.getElementById('reqName').value,
                reqPos: document.getElementById('reqPos').value,
                reqOldShift: document.getElementById('reqOldShift').value,
                reqNewShift: document.getElementById('reqNewShift').value,
                reqDate: document.getElementById('reqDate').value.slice(5),
                partName: document.getElementById('partName').value,
                partPos: document.getElementById('partPos').value,
                partOldShift: document.getElementById('partOldShift').value,
                partNewShift: document.getElementById('partNewShift').value,
                partDate: document.getElementById('partDate').value.slice(5),
                status: '待批'
            };
            const code = compress(data);
            window.currentShareCode = code;
            document.getElementById("qrcode").innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: code, width: 220, height: 220 });
            document.getElementById('shareModal').style.display = 'flex';
        });

        window.copyShareCode = () => {
            const el = document.createElement('textarea'); el.value = window.currentShareCode;
            document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
            alert("代碼已複製");
        };

        window.exportToExcel = () => {
            const ws = XLSX.utils.json_to_sheet(allRequests);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Records");
            XLSX.writeFile(wb, "DutySwap_Records.xlsx");
        };

        function showStatus(scanned) {
            const found = allRequests.find(r => r.id === scanned.id);
            const icon = document.getElementById('statusIcon');
            const details = document.getElementById('statusDetails');
            if (!found) {
                icon.innerHTML = '<i data-lucide="help-circle" class="w-10 h-10 text-slate-300"></i>';
                document.getElementById('statusTitle').innerText = "未匯入";
                details.innerHTML = "請先將 QR Code 交給主管掃描匯入。";
            } else {
                const color = found.status === '已批' ? 'emerald' : (found.status === '拒絕' ? 'red' : 'blue');
                icon.className = `mx-auto mb-4 w-16 h-16 rounded-full flex items-center justify-center bg-${color}-100`;
                icon.innerHTML = `<i data-lucide="${found.status==='已批'?'check':(found.status==='拒絕'?'x':'clock')}" class="w-8 h-8 text-${color}-600"></i>`;
                document.getElementById('statusTitle').innerText = found.status;
                details.innerHTML = `申請人：${found.reqName}<br>對調：${found.partName}<br>日期：${found.reqDate}`;
            }
            lucide.createIcons();
            document.getElementById('statusModal').style.display = 'flex';
        }

        document.addEventListener('DOMContentLoaded', () => { render(); updateBadge(); });
    </script>
</body>
</html>
