<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>醫院調更管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .tab-active { border-bottom: 4px solid #2563eb; color: #2563eb; font-weight: 900; }
        
        #alertModal, #passwordModal {
            display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center; padding: 1rem;
        }

        .date-field-group { position: relative; cursor: pointer; width: 100%; }
        .real-date-picker { position: absolute; bottom: 0; left: 50%; width: 0; height: 0; opacity: 0; pointer-events: none; }

        .fake-input {
            width: 100%; height: 3.5rem; background: white; border: 1px solid #e2e8f0; border-radius: 0.75rem;
            display: flex; align-items: center; padding: 0 1rem; font-size: 0.875rem; color: #64748b; transition: all 0.2s;
        }
        
        .date-field-group:active .fake-input { background-color: #f1f5f9; border-color: #3b82f6; }
        
        /* 更期標籤顏色微調 */
        .badge-shift { @apply px-2 py-0.5 rounded text-xs font-black text-white; }
        .bg-shift-A { background-color: #f59e0b; }
        .bg-shift-P { background-color: #10b981; }
        .bg-shift-N { background-color: #6366f1; }
        .bg-shift-O { background-color: #94a3b8; }
    </style>
</head>
<body class="min-h-screen pb-12">

    <nav class="bg-white shadow-sm border-b sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 flex justify-between h-16 items-center">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-xl shadow-lg shadow-blue-100">
                    <i data-lucide="shuffle" class="text-white w-6 h-6"></i>
                </div>
                <span class="text-xl font-black text-gray-800 tracking-tight">醫院調更管理系統</span>
            </div>
            <div class="flex gap-2 h-full">
                <button onclick="switchTab('apply')" id="tabApply" class="px-6 flex items-center tab-active transition-all">提交申請</button>
                <button onclick="requestAdminAccess()" id="tabAdmin" class="px-6 flex items-center text-gray-500 hover:text-blue-600 transition-all relative">
                    主管批核 
                    <span id="pendingBadge" class="absolute top-3 right-2 hidden bg-red-500 text-white text-[10px] px-1.5 py-0.5 rounded-full border-2 border-white font-bold">0</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-8">
        <section id="sectionApply">
            <div class="max-w-2xl mx-auto bg-white rounded-3xl shadow-sm border p-8">
                <div class="flex items-center gap-2 mb-8">
                    <span class="w-2 h-8 bg-blue-600 rounded-full"></span>
                    <h2 class="text-2xl font-black text-gray-800">建立新調更申請</h2>
                </div>
                <form id="swapForm" class="space-y-10">
                    
                    <!-- 申請人區塊 -->
                    <div class="p-6 bg-blue-50/50 rounded-2xl space-y-5 border border-blue-100 relative">
                        <div class="absolute -top-3 left-6 bg-blue-600 text-white text-[10px] px-4 py-1.5 rounded-full font-bold uppercase tracking-widest shadow-sm">本人 / 申請人</div>
                        
                        <div class="grid grid-cols-2 gap-4">
                            <div class="relative col-span-2 md:col-span-1">
                                <input type="text" id="reqName" required class="w-full pl-5 pr-12 py-4 border border-blue-200 rounded-xl text-base outline-none focus:ring-2 focus:ring-blue-400 bg-white" placeholder="您的姓名">
                                <div class="absolute right-4 top-1/2 -translate-y-1/2 text-blue-400"><i data-lucide="user" class="w-5 h-5"></i></div>
                            </div>
                            <select id="reqPos" required class="w-full px-4 py-3 border border-blue-200 rounded-xl text-sm bg-white font-bold text-gray-700 outline-none md:col-span-1">
                                <option value="" disabled selected>職位</option>
                                <option value="APN">APN</option><option value="RN">RN</option><option value="EA">EA</option><option value="PCA">PCA</option>
                            </select>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="space-y-1">
                                <label class="text-[10px] font-bold text-blue-400 ml-1">原本更期</label>
                                <select id="reqOldShift" required class="w-full px-4 py-3 border border-blue-200 rounded-xl text-sm bg-white font-bold text-gray-600 outline-none">
                                    <option value="A">A (早更)</option><option value="P">P (午更)</option><option value="N">N (夜更)</option><option value="O">O (放假)</option>
                                    <option value="D">D (全日)</option><option value="1-9">1-9</option><option value="11-7">11-7</option><option value="VL">VL (年假)</option>
                                </select>
                            </div>
                            <div class="space-y-1">
                                <label class="text-[10px] font-bold text-blue-600 ml-1">調換後更期</label>
                                <select id="reqNewShift" required class="w-full px-4 py-3 border border-blue-400 rounded-xl text-sm bg-white font-bold text-blue-600 outline-none shadow-sm">
                                    <option value="A">A (早更)</option><option value="P">P (午更)</option><option value="N">N (夜更)</option><option value="O">O (放假)</option>
                                    <option value="D">D (全日)</option><option value="1-9">1-9</option><option value="11-7">11-7</option><option value="VL">VL (年假)</option>
                                </select>
                            </div>
                        </div>

                        <div class="date-field-group" onclick="triggerDatePicker('picker_reqDate')">
                            <div class="fake-input" id="disp_reqDate">選擇調更日期 (日/月/年)</div>
                            <div class="absolute right-4 top-1/2 -translate-y-1/2 text-blue-400"><i data-lucide="calendar" class="w-4 h-4"></i></div>
                            <input type="date" id="picker_reqDate" class="real-date-picker" onchange="updateDisplay(this, 'disp_reqDate')">
                        </div>
                    </div>

                    <!-- 對調同事區塊 -->
                    <div class="p-6 bg-orange-50/50 rounded-2xl space-y-5 border border-orange-100 relative mt-10">
                        <div class="absolute -top-3 left-6 bg-orange-500 text-white text-[10px] px-4 py-1.5 rounded-full font-bold uppercase tracking-widest shadow-sm">對調同事</div>
                        
                        <div class="grid grid-cols-2 gap-4">
                            <div class="relative col-span-2 md:col-span-1">
                                <input type="text" id="partName" required class="w-full pl-5 pr-12 py-4 border border-orange-200 rounded-xl text-base outline-none focus:ring-2 focus:ring-orange-400 bg-white" placeholder="對象姓名">
                                <div class="absolute right-4 top-1/2 -translate-y-1/2 text-orange-400"><i data-lucide="user-plus" class="w-5 h-5"></i></div>
                            </div>
                            <select id="partPos" required class="w-full px-4 py-3 border border-orange-200 rounded-xl text-sm bg-white font-bold text-gray-700 outline-none md:col-span-1">
                                <option value="" disabled selected>職位</option>
                                <option value="APN">APN</option><option value="RN">RN</option><option value="EA">EA</option><option value="PCA">PCA</option>
                            </select>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="space-y-1">
                                <label class="text-[10px] font-bold text-orange-400 ml-1">原本更期</label>
                                <select id="partOldShift" required class="w-full px-4 py-3 border border-orange-200 rounded-xl text-sm bg-white font-bold text-gray-600 outline-none">
                                    <option value="A">A (早更)</option><option value="P">P (午更)</option><option value="N">N (夜更)</option><option value="O">O (放假)</option>
                                    <option value="D">D (全日)</option><option value="1-9">1-9</option><option value="11-7">11-7</option><option value="VL">VL (年假)</option>
                                </select>
                            </div>
                            <div class="space-y-1">
                                <label class="text-[10px] font-bold text-orange-600 ml-1">調換後更期</label>
                                <select id="partNewShift" required class="w-full px-4 py-3 border border-orange-400 rounded-xl text-sm bg-white font-bold text-orange-600 outline-none shadow-sm">
                                    <option value="A">A (早更)</option><option value="P">P (午更)</option><option value="N">N (夜更)</option><option value="O">O (放假)</option>
                                    <option value="D">D (全日)</option><option value="1-9">1-9</option><option value="11-7">11-7</option><option value="VL">VL (年假)</option>
                                </select>
                            </div>
                        </div>

                        <div class="date-field-group" onclick="triggerDatePicker('picker_partDate')">
                            <div class="fake-input" id="disp_partDate">選擇對象調更日期 (日/月/年)</div>
                            <div class="absolute right-4 top-1/2 -translate-y-1/2 text-orange-400"><i data-lucide="calendar" class="w-4 h-4"></i></div>
                            <input type="date" id="picker_partDate" class="real-date-picker" onchange="updateDisplay(this, 'disp_partDate')">
                        </div>
                    </div>

                    <button type="submit" class="w-full bg-gray-900 hover:bg-black text-white font-black py-5 rounded-2xl shadow-xl transition-all active:scale-[0.98] text-lg flex items-center justify-center gap-2">
                        <i data-lucide="send" class="w-5 h-5"></i>
                        提交調更申請
                    </button>
                </form>
            </div>
        </section>

        <!-- 管理頁面 -->
        <section id="sectionAdmin" class="hidden">
            <div class="bg-white rounded-3xl shadow-sm border overflow-hidden">
                <div class="p-8 border-b flex justify-between items-center bg-white flex-wrap gap-4">
                    <h2 class="text-2xl font-black text-gray-800 flex items-center gap-2">
                        <i data-lucide="database" class="text-blue-600"></i>
                        主管批核中心
                    </h2>
                    <button onclick="clearAllData()" class="text-red-500 text-xs font-bold border border-red-100 px-3 py-1 rounded-lg hover:bg-red-50">清除所有記錄</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 text-gray-400 text-[11px] uppercase font-black">
                            <tr>
                                <th class="px-8 py-5">職位</th>
                                <th class="px-8 py-5">申請人 / 變更</th>
                                <th class="px-8 py-5 text-right">對象 / 變更</th>
                                <th class="px-8 py-5 text-center">狀態與操作</th>
                            </tr>
                        </thead>
                        <tbody id="adminDataTable" class="divide-y divide-gray-100 text-sm"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <!-- Modals -->
    <div id="passwordModal">
        <div class="bg-white p-8 rounded-3xl w-full max-w-sm shadow-2xl">
            <h3 class="text-xl font-black mb-4">管理員驗證</h3>
            <input type="password" id="adminPassword" class="w-full border p-4 rounded-xl mb-4 outline-none focus:ring-2 focus:ring-blue-500" placeholder="密碼 (預設 1234)">
            <div class="flex gap-2">
                <button onclick="closePasswordModal()" class="flex-1 py-3 bg-gray-100 rounded-xl font-bold">取消</button>
                <button onclick="verifyPassword()" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold">進入</button>
            </div>
        </div>
    </div>

    <div id="alertModal">
        <div class="bg-white p-8 rounded-3xl w-full max-w-sm shadow-2xl text-center">
            <div id="alertIcon" class="mx-auto mb-4 bg-blue-100 text-blue-600 w-12 h-12 rounded-full flex items-center justify-center">
                <i data-lucide="check" class="w-6 h-6"></i>
            </div>
            <h3 id="alertTitle" class="text-xl font-black mb-2">提示</h3>
            <p id="alertDesc" class="text-gray-500 mb-6"></p>
            <button onclick="closeAlert()" class="w-full py-4 bg-gray-900 text-white rounded-xl font-black">確定</button>
        </div>
    </div>

    <script>
        lucide.createIcons();
        let allRequests = JSON.parse(localStorage.getItem('local_duty_data_v2')) || [];

        window.triggerDatePicker = (pickerId) => {
            const picker = document.getElementById(pickerId);
            if (picker.showPicker) picker.showPicker(); else picker.click();
        };

        window.updateDisplay = (picker, displayId) => {
            const val = picker.value;
            if (!val) return;
            const [y, m, d] = val.split('-');
            const displayEl = document.getElementById(displayId);
            displayEl.innerText = `${d}/${m}/${y}`;
            displayEl.style.color = "#1e293b";
            displayEl.style.fontWeight = "bold";
            displayEl.parentElement.style.borderColor = "#3b82f6";
        };

        document.getElementById('swapForm').onsubmit = (e) => {
            e.preventDefault();
            const d1 = document.getElementById('disp_reqDate').innerText;
            const d2 = document.getElementById('disp_partDate').innerText;

            if (d1.includes('選擇') || d2.includes('選擇')) {
                showAlert("請選擇日期", "申請人與對調同事的日期均為必填。");
                return;
            }

            const data = {
                id: Date.now(),
                reqName: document.getElementById('reqName').value,
                reqPos: document.getElementById('reqPos').value,
                reqOldShift: document.getElementById('reqOldShift').value,
                reqNewShift: document.getElementById('reqNewShift').value,
                reqDate: d1,
                partName: document.getElementById('partName').value,
                partPos: document.getElementById('partPos').value,
                partOldShift: document.getElementById('partOldShift').value,
                partNewShift: document.getElementById('partNewShift').value,
                partDate: d2,
                status: '待批核',
                timestamp: new Date().toLocaleString()
            };

            allRequests.unshift(data);
            localStorage.setItem('local_duty_data_v2', JSON.stringify(allRequests));
            showAlert("提交成功", "申請已儲存，請通知主管批核。");
            e.target.reset();
            resetUI();
            renderAdminTable();
            updateBadge();
        };

        function resetUI() {
            document.getElementById('disp_reqDate').innerText = "選擇調更日期 (日/月/年)";
            document.getElementById('disp_partDate').innerText = "選擇對象調更日期 (日/月/年)";
            document.querySelectorAll('.fake-input').forEach(i => {
                i.style.color = "#64748b";
                i.style.fontWeight = "normal";
                i.parentElement.style.borderColor = "#e2e8f0";
            });
        }

        // 輔助函式：獲取更期對應的 CSS class
        function getShiftClass(shift) {
            if (['A', 'P', 'N', 'O'].includes(shift)) return `bg-shift-${shift}`;
            return 'bg-gray-400';
        }

        window.renderAdminTable = () => {
            const tbody = document.getElementById('adminDataTable');
            if (allRequests.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="py-20 text-center text-gray-300">無本地記錄</td></tr>';
                return;
            }
            tbody.innerHTML = allRequests.map(r => `
                <tr class="hover:bg-gray-50 border-b">
                    <td class="px-8 py-6">
                        <span class="bg-gray-800 text-white px-2 py-1 rounded text-[10px] font-bold">${r.reqPos}</span>
                    </td>
                    <td class="px-8 py-6">
                        <div class="font-black text-gray-800 text-base">${r.reqName}</div>
                        <div class="text-[10px] text-gray-400 mb-2">${r.reqDate}</div>
                        <div class="flex items-center gap-2">
                            <span class="text-gray-400 line-through text-xs">${r.reqOldShift}</span>
                            <i data-lucide="arrow-right" class="w-3 h-3 text-blue-500"></i>
                            <span class="badge-shift ${getShiftClass(r.reqNewShift)}">${r.reqNewShift}</span>
                        </div>
                    </td>
                    <td class="px-8 py-6 text-right">
                        <div class="font-black text-gray-800 text-base">${r.partName}</div>
                        <div class="text-[10px] text-gray-400 mb-2">${r.partDate}</div>
                        <div class="flex items-center gap-2 justify-end">
                            <span class="text-gray-400 line-through text-xs">${r.partOldShift}</span>
                            <i data-lucide="arrow-right" class="w-3 h-3 text-orange-500"></i>
                            <span class="badge-shift ${getShiftClass(r.partNewShift)}">${r.partNewShift}</span>
                        </div>
                    </td>
                    <td class="px-8 py-6 text-center">
                        <div class="flex flex-col items-center gap-2">
                            <span class="text-[10px] font-black tracking-widest uppercase ${r.status === '已批准' ? 'text-emerald-500' : (r.status === '已拒絕' ? 'text-red-400' : 'text-gray-400')}">${r.status}</span>
                            ${r.status === '待批核' ? `
                                <div class="flex gap-2">
                                    <button onclick="updateStatus(${r.id}, '已批准')" class="p-2 bg-emerald-50 text-emerald-600 rounded-full hover:bg-emerald-600 hover:text-white transition-all"><i data-lucide="check" class="w-4 h-4"></i></button>
                                    <button onclick="updateStatus(${r.id}, '已拒絕')" class="p-2 bg-red-50 text-red-600 rounded-full hover:bg-red-600 hover:text-white transition-all"><i data-lucide="x" class="w-4 h-4"></i></button>
                                </div>
                            ` : `<button onclick="deleteRow(${r.id})" class="text-gray-300 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>`}
                        </div>
                    </td>
                </tr>
            `).join('');
            lucide.createIcons();
        };

        window.updateStatus = (id, s) => {
            allRequests = allRequests.map(r => r.id === id ? {...r, status: s} : r);
            localStorage.setItem('local_duty_data_v2', JSON.stringify(allRequests));
            renderAdminTable();
            updateBadge();
        };

        window.deleteRow = (id) => {
            allRequests = allRequests.filter(r => r.id !== id);
            localStorage.setItem('local_duty_data_v2', JSON.stringify(allRequests));
            renderAdminTable();
            updateBadge();
        };

        window.clearAllData = () => { if(confirm("確定清空所有本地記錄？")) { allRequests = []; localStorage.removeItem('local_duty_data_v2'); renderAdminTable(); updateBadge(); } };

        window.switchTab = (t) => {
            document.getElementById('sectionApply').classList.toggle('hidden', t !== 'apply');
            document.getElementById('sectionAdmin').classList.toggle('hidden', t === 'apply');
            document.getElementById('tabApply').classList.toggle('tab-active', t === 'apply');
            document.getElementById('tabAdmin').classList.toggle('tab-active', t !== 'apply');
        };

        window.requestAdminAccess = () => document.getElementById('passwordModal').style.display = 'flex';
        window.closePasswordModal = () => document.getElementById('passwordModal').style.display = 'none';
        window.verifyPassword = () => {
            if (document.getElementById('adminPassword').value === "1234") {
                closePasswordModal();
                switchTab('admin');
            } else { showAlert("錯誤", "驗證失敗，請重試。"); }
        };

        window.updateBadge = () => {
            const count = allRequests.filter(r => r.status === '待批核').length;
            const b = document.getElementById('pendingBadge');
            b.innerText = count;
            b.classList.toggle('hidden', count === 0);
        };

        window.showAlert = (t, d) => {
            document.getElementById('alertTitle').innerText = t;
            document.getElementById('alertDesc').innerText = d;
            document.getElementById('alertModal').style.display = 'flex';
        };
        window.closeAlert = () => document.getElementById('alertModal').style.display = 'none';

        renderAdminTable();
        updateBadge();
    </script>
</body>
</html>
