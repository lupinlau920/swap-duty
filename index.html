<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>醫院調更管理系統 - 極限辨識版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <!-- 引入 jsQR 用於圖片識別 -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .tab-active { border-bottom: 4px solid #2563eb; color: #2563eb; font-weight: 900; }
        
        #passwordModal, #shareModal, #scanModal, #statusModal {
            display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px); z-index: 1000; align-items: center; justify-content: center; padding: 1.5rem;
        }

        #qrcode-container {
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 0 40px rgba(0,0,0,0.1);
            display: inline-block;
        }
        #qrcode { 
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #qrcode img { 
            image-rendering: pixelated;
            border: 4px solid white;
        }
        .error-ring { ring: 2px solid #ef4444 !important; }
    </style>
</head>
<body class="min-h-screen pb-12">

    <nav class="bg-white shadow-sm border-b sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 flex justify-between h-16 items-center">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 p-1.5 rounded-lg">
                    <i data-lucide="hospital" class="text-white w-5 h-5"></i>
                </div>
                <span class="text-lg font-black text-gray-800">調更系統 v3.8</span>
            </div>
            <div class="flex gap-1 h-full">
                <button onclick="switchTab('apply')" id="tabApply" class="px-3 flex items-center tab-active text-sm">申請</button>
                <button onclick="requestAdminAccess()" id="tabAdmin" class="px-3 flex items-center text-gray-500 text-sm font-bold relative">
                    批核 <span id="pendingBadge" class="absolute top-3 right-0 hidden bg-red-500 text-white text-[9px] px-1.5 py-0.5 rounded-full">0</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4">
        <section id="sectionApply" class="space-y-4">
            <div onclick="openScanModal('status')" class="bg-blue-600 p-5 rounded-2xl text-white flex justify-between items-center shadow-lg active:scale-95 transition-all cursor-pointer">
                <div class="flex items-center gap-4">
                    <i data-lucide="search" class="w-8 h-8 opacity-80"></i>
                    <div>
                        <div class="font-black text-lg">查詢申請進度</div>
                        <div class="text-xs opacity-70">掃描 QR Code 查看批核狀態</div>
                    </div>
                </div>
                <i data-lucide="chevron-right"></i>
            </div>

            <div class="bg-white rounded-3xl shadow-md p-6 border border-slate-200">
                <h2 class="text-xl font-black mb-6 text-slate-800">填寫調更資料</h2>
                <form id="swapForm" class="space-y-6">
                    <!-- 申請人部分 -->
                    <div class="bg-slate-50 p-4 rounded-2xl space-y-3 border-l-4 border-blue-500">
                        <div class="flex items-center gap-2 mb-2 text-blue-600 font-black text-sm border-b pb-2 border-blue-100">
                            <i data-lucide="user" class="w-4 h-4"></i> 申請人 (本人)
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <input type="text" id="reqName" required placeholder="姓名" class="p-3 rounded-xl border-none ring-1 ring-slate-200 text-sm focus:ring-2 focus:ring-blue-500">
                            <select id="reqPos" class="p-3 rounded-xl border-none ring-1 ring-slate-200 text-sm">
                                <option>RN</option><option>APN</option><option>EA</option><option>PCA</option>
                            </select>
                        </div>
                        <div class="grid grid-cols-3 gap-2">
                            <div class="flex flex-col gap-1">
                                <label class="text-[10px] font-bold text-slate-400 ml-1">原本更期</label>
                                <select id="reqOldShift" class="p-2 rounded-lg text-xs bg-white ring-1 ring-slate-200">
                                    <option value="A">A</option><option value="P">P</option><option value="N">N</option><option value="O">O</option>
                                    <option value="D">D</option><option value="AL">AL</option><option value="11-7">11-7</option><option value="1-9">1-9</option>
                                </select>
                            </div>
                            <div class="flex items-center justify-center pt-4"><i data-lucide="arrow-right" class="w-4 h-4 text-slate-300"></i></div>
                            <div class="flex flex-col gap-1">
                                <label class="text-[10px] font-bold text-blue-400 ml-1">調換後更期</label>
                                <select id="reqNewShift" class="p-2 rounded-lg text-xs bg-blue-50 text-blue-700 ring-1 ring-blue-200 font-bold">
                                    <option value="A">A</option><option value="P">P</option><option value="N">N</option><option value="O">O</option>
                                    <option value="D">D</option><option value="AL">AL</option><option value="11-7">11-7</option><option value="1-9">1-9</option>
                                </select>
                            </div>
                        </div>
                        <input type="date" id="reqDate" required onchange="syncDates(this.value)" class="w-full p-3 rounded-xl border-none ring-1 ring-slate-200 text-sm">
                    </div>

                    <!-- 對調同事部分 -->
                    <div class="bg-slate-50 p-4 rounded-2xl space-y-3 border-l-4 border-orange-500">
                        <div class="flex items-center gap-2 mb-2 text-orange-600 font-black text-sm border-b pb-2 border-orange-100">
                            <i data-lucide="users" class="w-4 h-4"></i> 對調同事
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <input type="text" id="partName" required placeholder="姓名" class="p-3 rounded-xl border-none ring-1 ring-slate-200 text-sm focus:ring-2 focus:ring-orange-500">
                            <select id="partPos" class="p-3 rounded-xl border-none ring-1 ring-slate-200 text-sm">
                                <option>RN</option><option>APN</option><option>EA</option><option>PCA</option>
                            </select>
                        </div>
                        <div class="grid grid-cols-3 gap-2">
                            <div class="flex flex-col gap-1">
                                <label class="text-[10px] font-bold text-slate-400 ml-1">原本更期</label>
                                <select id="partOldShift" class="p-2 rounded-lg text-xs bg-white ring-1 ring-slate-200">
                                    <option value="A">A</option><option value="P">P</option><option value="N">N</option><option value="O">O</option>
                                    <option value="D">D</option><option value="AL">AL</option><option value="11-7">11-7</option><option value="1-9">1-9</option>
                                </select>
                            </div>
                            <div class="flex items-center justify-center pt-4"><i data-lucide="arrow-right" class="w-4 h-4 text-slate-300"></i></div>
                            <div class="flex flex-col gap-1">
                                <label class="text-[10px] font-bold text-orange-400 ml-1">調換後更期</label>
                                <select id="partNewShift" class="p-2 rounded-lg text-xs bg-orange-50 text-orange-700 ring-1 ring-orange-200 font-bold">
                                    <option value="A">A</option><option value="P">P</option><option value="N">N</option><option value="O">O</option>
                                    <option value="D">D</option><option value="AL">AL</option><option value="11-7">11-7</option><option value="1-9">1-9</option>
                                </select>
                            </div>
                        </div>
                        <div class="relative">
                            <input type="date" id="partDate" required class="w-full p-3 rounded-xl border-none ring-1 ring-slate-200 text-sm bg-slate-100" readonly>
                            <span class="absolute right-3 top-3 text-[10px] text-slate-400 font-bold">日期已同步</span>
                        </div>
                    </div>

                    <button type="submit" class="w-full bg-slate-900 text-white font-black py-5 rounded-2xl shadow-xl active:scale-95 transition-all text-lg">
                        生成申請二維碼
                    </button>
                </form>
            </div>
        </section>

        <section id="sectionAdmin" class="hidden space-y-4">
            <div class="flex justify-between items-end px-2">
                <div>
                    <h2 class="text-xl font-black">批核清單</h2>
                    <p class="text-[10px] text-blue-600 font-bold">💡 雙擊申請條目可顯示 QR Code</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="exportToExcel()" class="bg-white p-3 rounded-xl shadow-sm border border-slate-200 active:bg-slate-100 transition-colors"><i data-lucide="download" class="w-5 h-5 text-slate-600"></i></button>
                    <button onclick="openScanModal('import')" class="bg-blue-600 text-white px-4 py-2 rounded-xl font-bold flex items-center gap-2 active:scale-95 transition-all">
                        <i data-lucide="scan-line" class="w-5 h-5"></i> 掃描或匯入
                    </button>
                </div>
            </div>
            <div id="adminDataTable" class="space-y-4"></div>
            <div id="emptyState" class="text-center py-12 hidden">
                <i data-lucide="clipboard-list" class="w-12 h-12 text-slate-300 mx-auto mb-2"></i>
                <p class="text-slate-400 text-sm font-bold">目前暫無申請記錄</p>
            </div>
        </section>
    </main>

    <!-- Modals -->
    <div id="shareModal">
        <div class="bg-white p-6 rounded-3xl w-full max-w-sm text-center">
            <h3 class="text-xl font-black mb-1">申請二維碼</h3>
            <p class="text-xs text-slate-400 mb-6 font-bold">可用於查詢進度或交由主管批核</p>
            <div id="qrcode-container"><div id="qrcode"></div></div>
            <div class="grid grid-cols-2 gap-3 mt-8 mb-4">
                <button onclick="copyShareCode()" class="py-3 bg-slate-100 rounded-xl font-black text-sm active:bg-slate-200 transition-colors">複製代碼</button>
                <button onclick="whatsappShare()" class="py-3 bg-emerald-500 text-white rounded-xl font-black text-sm active:bg-emerald-600 transition-colors">WhatsApp</button>
            </div>
            <button onclick="closeShareModal()" class="text-slate-400 font-bold text-sm hover:text-slate-600 transition-colors">關閉</button>
        </div>
    </div>

    <div id="scanModal">
        <div class="bg-white p-5 rounded-3xl w-full max-w-md max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-black text-slate-800">匯入調更申請</h3>
                <button onclick="closeScanModal()"><i data-lucide="x" class="text-slate-400"></i></button>
            </div>
            <div id="reader" class="w-full aspect-square bg-black rounded-2xl overflow-hidden mb-4 shadow-inner"></div>
            <div class="grid grid-cols-1 gap-2 mb-4">
                <label class="w-full py-4 bg-blue-50 text-blue-600 border-2 border-dashed border-blue-200 rounded-2xl flex flex-col items-center justify-center cursor-pointer active:bg-blue-100 transition-colors">
                    <input type="file" id="qrImageInput" accept="image/*" class="hidden" onchange="handleImageUpload(this)">
                    <div class="flex items-center gap-2 font-black text-sm">
                        <i data-lucide="image" class="w-5 h-5"></i>
                        從相簿選擇 QR Code 截圖
                    </div>
                </label>
            </div>
            <div class="relative flex items-center py-2">
                <div class="flex-grow border-t border-slate-100"></div>
                <span class="flex-shrink mx-4 text-slate-400 text-[10px] font-black tracking-widest">或</span>
                <div class="flex-grow border-t border-slate-100"></div>
            </div>
            <div class="mt-4 space-y-3">
                <textarea id="manualCodeInput" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-[10px] font-mono h-16 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="在此貼上代碼..."></textarea>
                <button onclick="handleManualImport()" class="w-full py-3 bg-slate-900 text-white rounded-xl font-black text-sm active:scale-95 transition-all">手動代碼匯入</button>
            </div>
        </div>
    </div>

    <div id="statusModal">
        <div class="bg-white p-8 rounded-3xl w-full max-w-sm text-center">
            <div id="statusIcon" class="mx-auto mb-4 w-16 h-16 rounded-full flex items-center justify-center"></div>
            <h3 id="statusTitle" class="text-2xl font-black mb-4"></h3>
            <div id="statusDetails" class="text-sm bg-slate-50 p-4 rounded-2xl mb-6 space-y-1 text-left font-medium"></div>
            <button onclick="closeStatusModal()" class="w-full py-4 bg-slate-900 text-white rounded-xl font-black active:scale-95 transition-all">確認</button>
        </div>
    </div>

    <div id="passwordModal">
        <div class="bg-white p-6 rounded-3xl w-full max-w-xs text-center">
            <h3 class="font-black mb-4 text-slate-800">管理員驗證</h3>
            <input type="password" id="adminPassword" class="w-full p-4 bg-slate-100 rounded-xl mb-4 text-center text-xl tracking-widest focus:ring-2 focus:ring-blue-500 outline-none" placeholder="密碼">
            <button onclick="verifyPassword()" class="w-full py-4 bg-blue-600 text-white rounded-xl font-black active:scale-95 transition-all">進入批核</button>
        </div>
    </div>

    <script>
        lucide.createIcons();

        let allRequests = JSON.parse(localStorage.getItem('duty_v10_data')) || [];
        let html5QrCode = null;

        const shortMap = { id:'i', reqName:'n1', reqPos:'p1', reqOldShift:'o1', reqNewShift:'w1', reqDate:'d1', partName:'n2', partPos:'p2', partOldShift:'o2', partNewShift:'w2', partDate:'d2', status:'s' };

        // 同步日期函數
        window.syncDates = (val) => {
            document.getElementById('partDate').value = val;
        };

        const compress = (o) => {
            try {
                let s = "{";
                for(let k in o) s += `"${shortMap[k]}":"${o[k]}",`;
                s = s.slice(0,-1) + "}";
                return btoa(unescape(encodeURIComponent(s))).replace(/=/g, "");
            } catch(e) { return ""; }
        };

        const decompress = (str) => {
            try {
                let base64 = str.trim();
                while (base64.length % 4 !== 0) base64 += '=';
                const raw = decodeURIComponent(escape(atob(base64)));
                const obj = JSON.parse(raw);
                const res = {};
                for(let k in obj) {
                    const fullKey = Object.keys(shortMap).find(key => shortMap[key] === k);
                    if (fullKey) res[fullKey] = obj[k];
                }
                return res;
            } catch (e) { return null; }
        };

        window.handleImageUpload = (input) => {
            if (!input.files || !input.files[0]) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = img.width; canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const code = jsQR(imageData.data, imageData.width, imageData.height);
                    if (code) {
                        if (html5QrCode && html5QrCode.isScanning) {
                            html5QrCode.stop().then(() => {
                                document.getElementById('scanModal').style.display = 'none';
                                handleResult(code.data);
                            });
                        } else {
                            document.getElementById('scanModal').style.display = 'none';
                            handleResult(code.data);
                        }
                    } else alert("辨識失敗：圖片中找不到有效的 QR Code");
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        };

        document.getElementById('swapForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const reqOld = document.getElementById('reqOldShift').value;
            const reqNew = document.getElementById('reqNewShift').value;
            const partOld = document.getElementById('partOldShift').value;
            const partNew = document.getElementById('partNewShift').value;
            const date1 = document.getElementById('reqDate').value;
            const date2 = document.getElementById('partDate').value;

            // 驗證 1: 日期必須相同
            if (date1 !== date2) {
                alert("錯誤：申請人與對調同事的調更日期必須相同！");
                return;
            }

            // 驗證 2: 申請人原本更期不可與調換更期相同
            if (reqOld === reqNew) {
                alert(`錯誤：申請人原本是 ${reqOld} 更，不能調換為相同的 ${reqNew} 更！`);
                return;
            }

            // 驗證 3: 對調同事原本更期不可與調換更期相同
            if (partOld === partNew) {
                alert(`錯誤：同事原本是 ${partOld} 更，不能調換為相同的 ${partNew} 更！`);
                return;
            }

            const data = {
                id: Date.now().toString(36).toUpperCase(),
                reqName: document.getElementById('reqName').value,
                reqPos: document.getElementById('reqPos').value,
                reqOldShift: reqOld,
                reqNewShift: reqNew,
                reqDate: date1.slice(5),
                partName: document.getElementById('partName').value,
                partPos: document.getElementById('partPos').value,
                partOldShift: partOld,
                partNewShift: partNew,
                partDate: date2.slice(5),
                status: '待批'
            };
            showQRCode(data);
        });

        window.showQRCode = (data) => {
            const code = compress(data);
            window.currentShareCode = code;
            const qrDiv = document.getElementById("qrcode");
            qrDiv.innerHTML = "";
            new QRCode(qrDiv, { text: code, width: 220, height: 220, colorDark : "#000000", colorLight : "#ffffff", correctLevel : QRCode.CorrectLevel.M });
            document.getElementById('shareModal').style.display = 'flex';
        };

        window.openScanModal = (mode) => {
            window.currentScanMode = mode;
            document.getElementById('manualCodeInput').value = "";
            document.getElementById('scanModal').style.display = 'flex';
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 220 }, (text) => {
                html5QrCode.stop().then(() => { document.getElementById('scanModal').style.display = 'none'; handleResult(text); });
            }).catch(() => {
                document.getElementById('reader').innerHTML = `<div class="h-full flex flex-col items-center justify-center bg-slate-900 text-white p-4 text-center"><p class="text-xs">相機權限受限，請使用圖片匯入</p></div>`;
            });
        };

        window.handleManualImport = () => {
            const code = document.getElementById('manualCodeInput').value.trim();
            if (!code) return;
            if (html5QrCode && html5QrCode.isScanning) {
                html5QrCode.stop().then(() => { document.getElementById('scanModal').style.display = 'none'; handleResult(code); });
            } else { document.getElementById('scanModal').style.display = 'none'; handleResult(code); }
        };

        function handleResult(text) {
            const data = decompress(text);
            if (!data) return alert("無效代碼");
            if (window.currentScanMode === 'import') {
                if (!allRequests.some(r => r.id === data.id)) {
                    allRequests.unshift(data); save(); alert(`已匯入 ${data.reqName}`);
                } else alert("此申請已存在");
            } else showStatus(data);
        }

        function showStatus(scanned) {
            const found = allRequests.find(r => r.id === scanned.id);
            const icon = document.getElementById('statusIcon');
            const details = document.getElementById('statusDetails');
            if (!found) {
                icon.innerHTML = '<i data-lucide="help-circle" class="w-8 h-8 text-slate-400"></i>';
                document.getElementById('statusTitle').innerText = "查無記錄";
                details.innerHTML = "主管端尚未匯入此申請。";
            } else {
                icon.innerHTML = `<i data-lucide="${found.status==='已批'?'check':(found.status==='拒絕'?'x':'clock')}" class="w-8 h-8"></i>`;
                document.getElementById('statusTitle').innerText = found.status;
                details.innerHTML = `${found.reqName} ↔ ${found.partName}<br>${found.reqDate} (${found.reqOldShift}➔${found.reqNewShift})`;
            }
            lucide.createIcons();
            document.getElementById('statusModal').style.display = 'flex';
        }

        window.save = () => { localStorage.setItem('duty_v10_data', JSON.stringify(allRequests)); render(); updateBadge(); };
        
        window.render = () => {
            const container = document.getElementById('adminDataTable');
            const empty = document.getElementById('emptyState');
            if (allRequests.length === 0) { container.innerHTML = ""; empty.classList.remove('hidden'); return; }
            empty.classList.add('hidden');
            container.innerHTML = allRequests.map(r => `
                <div ondblclick='showQRCode(${JSON.stringify(r)})' class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center active:bg-slate-50 transition-all select-none cursor-pointer">
                    <div class="space-y-1">
                        <div class="font-black text-slate-800">${r.reqName} ↔ ${r.partName}</div>
                        <div class="text-[10px] text-slate-400 font-bold">${r.reqDate} (換更：${r.reqOldShift}➔${r.reqNewShift} | ${r.partOldShift}➔${r.partNewShift})</div>
                        <div class="text-[10px] inline-block px-2 py-0.5 rounded-full mt-1 ${r.status==='已批'?'bg-emerald-100 text-emerald-600':(r.status==='拒絕'?'bg-red-100 text-red-600':'bg-blue-100 text-blue-600')} font-black">${r.status}</div>
                    </div>
                    <div class="flex gap-2">
                        ${r.status === '待批' ? `
                            <button onclick="event.stopPropagation(); act('${r.id}','已批')" class="bg-emerald-500 text-white p-3 rounded-xl active:scale-90"><i data-lucide="check" class="w-4 h-4"></i></button>
                            <button onclick="event.stopPropagation(); act('${r.id}','拒絕')" class="bg-red-500 text-white p-3 rounded-xl active:scale-90"><i data-lucide="x" class="w-4 h-4"></i></button>
                        ` : `<button onclick="event.stopPropagation(); del('${r.id}')" class="text-slate-300 p-2 hover:text-red-500"><i data-lucide="trash-2" class="w-5 h-5"></i></button>`}
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        };

        window.act = (id, s) => { allRequests = allRequests.map(r => r.id === id ? {...r, status: s} : r); save(); };
        window.del = (id) => { if(confirm("確定刪除此記錄？")) { allRequests = allRequests.filter(r => r.id !== id); save(); } };
        window.switchTab = (t) => {
            document.getElementById('sectionApply').classList.toggle('hidden', t !== 'apply');
            document.getElementById('sectionAdmin').classList.toggle('hidden', t === 'apply');
            document.getElementById('tabApply').classList.toggle('tab-active', t === 'apply');
            document.getElementById('tabAdmin').classList.toggle('tab-active', t !== 'apply');
        };
        window.requestAdminAccess = () => document.getElementById('passwordModal').style.display = 'flex';
        window.verifyPassword = () => { 
            if (document.getElementById('adminPassword').value === "1234") { 
                document.getElementById('passwordModal').style.display='none'; 
                switchTab('admin'); 
            } else alert("密碼錯誤"); 
        };
        window.updateBadge = () => { 
            const count = allRequests.filter(r => r.status === '待批').length; 
            const b = document.getElementById('pendingBadge'); 
            b.innerText = count; b.classList.toggle('hidden', count === 0); 
        };
        window.closeScanModal = () => { 
            if (html5QrCode) html5QrCode.stop().finally(() => document.getElementById('scanModal').style.display='none');
            else document.getElementById('scanModal').style.display='none';
        };
        window.closeShareModal = () => document.getElementById('shareModal').style.display = 'none';
        window.closeStatusModal = () => document.getElementById('statusModal').style.display = 'none';
        window.copyShareCode = () => { 
            const el = document.createElement('textarea'); el.value = window.currentShareCode;
            document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
            alert("代碼已複製"); 
        };
        window.whatsappShare = () => { window.open(`https://wa.me/?text=${encodeURIComponent('調更申請代碼：\n' + window.currentShareCode)}`); };
        window.exportToExcel = () => { 
            if (allRequests.length === 0) return alert("無資料");
            const ws = XLSX.utils.json_to_sheet(allRequests); const wb = XLSX.utils.book_new(); 
            XLSX.utils.book_append_sheet(wb, ws, "Records"); XLSX.writeFile(wb, `DutySwap_Records.xlsx`); 
        };
        document.addEventListener('DOMContentLoaded', () => { render(); updateBadge(); });
    </script>
</body>
</html>
