<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>醫院調更管理系統 - QR進階版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .tab-active { border-bottom: 4px solid #2563eb; color: #2563eb; font-weight: 900; }
        
        #alertModal, #passwordModal, #shareModal, #importModal, #scanModal, #statusModal {
            display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center; padding: 1rem;
        }

        /* 穩定版日期輸入框樣式 */
        .native-date-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 0.75rem;
            padding: 0 1rem;
            height: 3.5rem;
            transition: all 0.2s;
        }
        
        .native-date-wrapper:focus-within {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .native-date-input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 1rem;
            color: #1e293b;
            font-weight: 600;
            outline: none;
            width: 100%;
            height: 100%;
            -webkit-appearance: none;
            min-height: 1.5rem;
        }

        /* 移除部分瀏覽器預設的圖示以保持美觀 */
        .native-date-input::-webkit-calendar-picker-indicator {
            background: transparent;
            bottom: 0;
            color: transparent;
            cursor: pointer;
            height: auto;
            left: 0;
            position: absolute;
            right: 0;
            top: 0;
            width: auto;
        }

        #qrcode canvas, #qrcode img { margin: 0 auto; border: 8px solid white; border-radius: 12px; }
        .status-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="min-h-screen pb-12">

    <!-- 導航欄 -->
    <nav class="bg-white shadow-sm border-b sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 flex justify-between h-16 items-center">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-xl shadow-lg shadow-blue-100">
                    <i data-lucide="shuffle" class="text-white w-6 h-6"></i>
                </div>
                <span class="text-xl font-black text-gray-800 tracking-tight">醫院調更系統</span>
            </div>
            <div class="flex gap-2 h-full">
                <button onclick="switchTab('apply')" id="tabApply" class="px-4 md:px-6 flex items-center tab-active transition-all text-sm md:text-base">提交申請</button>
                <button onclick="requestAdminAccess()" id="tabAdmin" class="px-4 md:px-6 flex items-center text-gray-500 hover:text-blue-600 transition-all relative text-sm md:text-base font-bold">
                    主管批核 
                    <span id="pendingBadge" class="absolute top-3 right-0 hidden bg-red-500 text-white text-[10px] px-1.5 py-0.5 rounded-full border-2 border-white font-bold">0</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-8">
        <section id="sectionApply" class="animate-in fade-in duration-500">
            <div class="max-w-2xl mx-auto space-y-6">
                <div class="bg-blue-600 rounded-2xl p-4 flex justify-between items-center text-white shadow-lg">
                    <div class="text-sm font-bold text-blue-50">已有申請 QR？</div>
                    <button onclick="openScanModal('status')" class="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-xl text-xs font-black flex items-center gap-2">
                        <i data-lucide="search" class="w-4 h-4"></i> 查看結果
                    </button>
                </div>

                <div class="bg-white rounded-3xl shadow-sm border p-6 md:p-8">
                    <div class="flex items-center gap-2 mb-8">
                        <span class="w-2 h-8 bg-blue-600 rounded-full"></span>
                        <h2 class="text-2xl font-black text-gray-800">建立新調更申請</h2>
                    </div>
                    <form id="swapForm" class="space-y-8">
                        <!-- 申請人區塊 -->
                        <div class="p-6 bg-blue-50/50 rounded-2xl space-y-5 border border-blue-100 relative">
                            <div class="absolute -top-3 left-6 bg-blue-600 text-white text-[10px] px-4 py-1.5 rounded-full font-bold uppercase tracking-widest">本人 / 申請人</div>
                            <div class="grid grid-cols-2 gap-4">
                                <input type="text" id="reqName" required class="w-full px-5 py-4 border border-blue-200 rounded-xl text-base outline-none focus:ring-2 focus:ring-blue-400 bg-white" placeholder="您的姓名">
                                <select id="reqPos" required class="w-full px-4 py-3 border border-blue-200 rounded-xl text-sm bg-white font-bold text-gray-700">
                                    <option value="" disabled selected>職位</option>
                                    <option value="APN">APN</option><option value="RN">RN</option><option value="EA">EA</option><option value="PCA">PCA</option>
                                </select>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div class="space-y-1">
                                    <label class="text-[10px] font-bold text-blue-400 ml-1">原本更期</label>
                                    <select id="reqOldShift" required class="w-full px-4 py-3 border border-blue-200 rounded-xl text-sm bg-white font-bold text-gray-600">
                                        <option value="A">A</option><option value="P">P</option><option value="N">N</option><option value="O">O</option><option value="D">D</option><option value="VL">VL</option>
                                    </select>
                                </div>
                                <div class="space-y-1">
                                    <label class="text-[10px] font-bold text-blue-600 ml-1">調換後更期</label>
                                    <select id="reqNewShift" required class="w-full px-4 py-3 border border-blue-400 rounded-xl text-sm bg-white font-bold text-blue-600">
                                        <option value="A">A</option><option value="P">P</option><option value="N">N</option><option value="O">O</option><option value="D">D</option><option value="VL">VL</option>
                                    </select>
                                </div>
                            </div>
                            <!-- 穩定版日期選擇 -->
                            <div class="space-y-1">
                                <label class="text-[10px] font-bold text-blue-600 ml-1">調更日期</label>
                                <div class="native-date-wrapper" onclick="this.querySelector('input').showPicker()">
                                    <i data-lucide="calendar" class="w-5 h-5 mr-3 text-blue-500"></i>
                                    <input type="date" id="reqDate" required class="native-date-input">
                                </div>
                            </div>
                        </div>

                        <!-- 對調同事區塊 -->
                        <div class="p-6 bg-orange-50/50 rounded-2xl space-y-5 border border-orange-100 relative">
                            <div class="absolute -top-3 left-6 bg-orange-500 text-white text-[10px] px-4 py-1.5 rounded-full font-bold uppercase tracking-widest">對調同事</div>
                            <div class="grid grid-cols-2 gap-4">
                                <input type="text" id="partName" required class="w-full px-5 py-4 border border-orange-200 rounded-xl text-base outline-none focus:ring-2 focus:ring-orange-400 bg-white" placeholder="對象姓名">
                                <select id="partPos" required class="w-full px-4 py-3 border border-orange-200 rounded-xl text-sm bg-white font-bold text-gray-700">
                                    <option value="" disabled selected>職位</option>
                                    <option value="APN">APN</option><option value="RN">RN</option><option value="EA">EA</option><option value="PCA">PCA</option>
                                </select>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div class="space-y-1">
                                    <label class="text-[10px] font-bold text-orange-400 ml-1">原本更期</label>
                                    <select id="partOldShift" required class="w-full px-4 py-3 border border-orange-200 rounded-xl text-sm bg-white font-bold text-gray-600">
                                        <option value="A">A</option><option value="P">P</option><option value="N">N</option><option value="O">O</option><option value="D">D</option><option value="VL">VL</option>
                                    </select>
                                </div>
                                <div class="space-y-1">
                                    <label class="text-[10px] font-bold text-orange-600 ml-1">調換後更期</label>
                                    <select id="partNewShift" required class="w-full px-4 py-3 border border-orange-400 rounded-xl text-sm bg-white font-bold text-orange-600">
                                        <option value="A">A</option><option value="P">P</option><option value="N">N</option><option value="O">O</option><option value="D">D</option><option value="VL">VL</option>
                                    </select>
                                </div>
                            </div>
                            <!-- 穩定版日期選擇 -->
                            <div class="space-y-1">
                                <label class="text-[10px] font-bold text-orange-600 ml-1">對調日期</label>
                                <div class="native-date-wrapper" onclick="this.querySelector('input').showPicker()">
                                    <i data-lucide="calendar" class="w-5 h-5 mr-3 text-orange-500"></i>
                                    <input type="date" id="partDate" required class="native-date-input">
                                </div>
                            </div>
                        </div>

                        <button type="submit" class="w-full bg-gray-900 text-white font-black py-5 rounded-2xl shadow-xl active:scale-[0.98] text-lg flex items-center justify-center gap-2">
                            <i data-lucide="qr-code" class="w-5 h-5"></i> 生成申請 QR Code
                        </button>
                    </form>
                </div>
            </div>
        </section>

        <!-- 管理與彈窗區塊保持不變 -->
        <section id="sectionAdmin" class="hidden animate-in slide-in-from-bottom duration-500">
            <div class="bg-white rounded-3xl shadow-sm border overflow-hidden">
                <div class="p-6 border-b flex justify-between items-center bg-white flex-wrap gap-4">
                    <h2 class="text-xl font-black text-gray-800 flex items-center gap-2">
                        <i data-lucide="shield-check" class="text-blue-600"></i> 批核中心
                    </h2>
                    <div class="flex gap-2 w-full md:w-auto">
                        <button onclick="exportToExcel()" class="flex-1 md:flex-none bg-emerald-600 text-white text-xs font-bold px-4 py-3 rounded-xl shadow-lg">導出 Excel</button>
                        <button onclick="openScanModal('import')" class="flex-1 md:flex-none bg-orange-600 text-white text-xs font-bold px-4 py-3 rounded-xl shadow-lg flex items-center justify-center gap-1">
                            <i data-lucide="scan-line" class="w-4 h-4"></i> 掃描 / 匯入
                        </button>
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 text-gray-400 text-[10px] uppercase font-black">
                            <tr><th class="px-6 py-4">申請人資訊</th><th class="px-6 py-4 text-right">對調同事</th><th class="px-6 py-4 text-center">狀態</th></tr>
                        </thead>
                        <tbody id="adminDataTable" class="divide-y divide-gray-100 text-sm"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <!-- Modals (Scan, Status, Share, Password, Alert) -->
    <div id="scanModal">
        <div class="bg-white p-6 rounded-3xl w-full max-w-md shadow-2xl">
            <div class="flex justify-between items-center mb-4">
                <h3 id="scanModalTitle" class="text-xl font-black">掃描 QR Code</h3>
                <button onclick="closeScanModal()" class="text-gray-400"><i data-lucide="x"></i></button>
            </div>
            <div id="reader" class="w-full overflow-hidden rounded-2xl bg-black aspect-square mb-4"></div>
            <label class="w-full py-4 bg-blue-50 text-blue-600 rounded-xl font-bold flex items-center justify-center gap-2 cursor-pointer border-2 border-dashed border-blue-200 mb-2">
                <i data-lucide="image" class="w-5 h-5"></i> 從相簿選取照片
                <input type="file" id="qr-input-file" accept="image/*" class="hidden" onchange="processFileScan(this)">
            </label>
            <button onclick="closeScanModal()" class="w-full py-3 text-gray-400 font-bold">返回</button>
        </div>
    </div>

    <div id="statusModal">
        <div class="bg-white p-8 rounded-3xl w-full max-w-md shadow-2xl text-center">
            <div id="statusIcon" class="mx-auto mb-4 w-20 h-20 rounded-full flex items-center justify-center"></div>
            <h3 id="statusTitle" class="text-2xl font-black mb-2"></h3>
            <div id="statusDetails" class="bg-gray-50 p-4 rounded-2xl text-sm text-left mb-6 space-y-1"></div>
            <button onclick="closeStatusModal()" class="w-full py-4 bg-gray-900 text-white rounded-xl font-black">關閉</button>
        </div>
    </div>

    <div id="shareModal">
        <div class="bg-white p-8 rounded-3xl w-full max-w-md shadow-2xl text-center">
            <div class="mx-auto mb-4 bg-blue-100 text-blue-600 w-12 h-12 rounded-full flex items-center justify-center"><i data-lucide="qr-code"></i></div>
            <h3 class="text-2xl font-black mb-1">申請 QR Code</h3>
            <div id="qrcode" class="mb-6"></div>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="copyShareCode()" class="py-4 bg-gray-100 rounded-xl font-black text-sm">複製代碼</button>
                <button onclick="whatsappShare()" class="py-4 bg-emerald-500 text-white rounded-xl font-black text-sm">WhatsApp</button>
            </div>
            <button onclick="closeShareModal()" class="w-full mt-4 py-2 text-gray-400 font-bold text-xs">返回修改</button>
        </div>
    </div>

    <div id="passwordModal">
        <div class="bg-white p-8 rounded-3xl w-full max-sm shadow-2xl">
            <h3 class="text-xl font-black mb-4">管理員驗證</h3>
            <input type="password" id="adminPassword" class="w-full border p-4 rounded-xl mb-4" placeholder="密碼 (1234)">
            <button onclick="verifyPassword()" class="w-full py-3 bg-blue-600 text-white rounded-xl font-bold">進入</button>
            <button onclick="closePasswordModal()" class="w-full mt-2 py-2 text-gray-400 font-bold text-xs">取消</button>
        </div>
    </div>

    <div id="alertModal">
        <div class="bg-white p-8 rounded-3xl w-full max-sm shadow-2xl text-center">
            <h3 id="alertTitle" class="text-xl font-black mb-2"></h3>
            <p id="alertDesc" class="text-gray-500 mb-6 text-sm"></p>
            <button onclick="closeAlert()" class="w-full py-4 bg-gray-900 text-white rounded-xl font-black">確定</button>
        </div>
    </div>

    <script>
        lucide.createIcons();
        let allRequests = JSON.parse(localStorage.getItem('local_duty_data_v4')) || [];
        let currentShareCode = "";
        let html5QrCode = null;
        let currentScanMode = 'import';

        // 格式化日期顯示 (YYYY-MM-DD -> DD/MM/YYYY)
        const formatDate = (val) => {
            if(!val) return "";
            const [y, m, d] = val.split('-');
            return `${d}/${m}/${y}`;
        };

        // 表單提交
        document.getElementById('swapForm').onsubmit = (e) => {
            e.preventDefault();
            
            const data = {
                id: "REQ-" + Date.now(), 
                reqName: document.getElementById('reqName').value,
                reqPos: document.getElementById('reqPos').value,
                reqOldShift: document.getElementById('reqOldShift').value,
                reqNewShift: document.getElementById('reqNewShift').value,
                reqDate: formatDate(document.getElementById('reqDate').value),
                partName: document.getElementById('partName').value,
                partPos: document.getElementById('partPos').value,
                partOldShift: document.getElementById('partOldShift').value,
                partNewShift: document.getElementById('partNewShift').value,
                partDate: formatDate(document.getElementById('partDate').value),
                status: '待批核',
                timestamp: new Date().toLocaleString()
            };

            currentShareCode = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
            document.getElementById("qrcode").innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: currentShareCode, width: 200, height: 200 });
            document.getElementById('shareModal').style.display = 'flex';
        };

        // 掃描與邏輯
        window.openScanModal = (mode) => {
            currentScanMode = mode;
            document.getElementById('scanModalTitle').innerText = mode === 'status' ? '查看狀態' : '掃描申請';
            document.getElementById('scanModal').style.display = 'flex';
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, handleDecodedText).catch(() => { });
        };

        window.processFileScan = (input) => {
            if (!input.files || input.files.length === 0) return;
            const scanner = new Html5Qrcode("reader");
            scanner.scanFile(input.files[0], true).then(handleDecodedText).catch(() => showAlert("讀取失敗", "找不到 QR Code。"));
        };

        function handleDecodedText(text) {
            closeScanModal();
            try {
                const data = JSON.parse(decodeURIComponent(escape(atob(text))));
                if (currentScanMode === 'import') {
                    if (!allRequests.find(r => r.id === data.id)) {
                        allRequests.unshift(data);
                        saveAndRender();
                        showAlert("匯入成功", "主管已收到申請。");
                    } else showAlert("提示", "此申請已存在。");
                } else checkStatus(data.id, data);
            } catch (e) { showAlert("錯誤", "無效格式。"); }
        }

        function checkStatus(id, originalData) {
            const found = allRequests.find(r => r.id === id);
            const statusModal = document.getElementById('statusModal');
            const iconBox = document.getElementById('statusIcon');
            const title = document.getElementById('statusTitle');
            const details = document.getElementById('statusDetails');

            if (!found) {
                iconBox.className = "mx-auto mb-4 w-20 h-20 rounded-full flex items-center justify-center bg-gray-100 text-gray-400";
                iconBox.innerHTML = '<i data-lucide="clock" class="w-10 h-10 status-pulse"></i>';
                title.innerText = "主管尚未匯入";
                details.innerHTML = `<p><b>申請人:</b> ${originalData.reqName}</p><p class="text-xs text-gray-500 mt-2">主管尚未掃描此 QR，請提醒主管。</p>`;
            } else {
                const colors = { '待批核': 'blue', '已批准': 'emerald', '已拒絕': 'red' };
                const icons = { '待批核': 'loader', '已批准': 'check-circle', '已拒絕': 'x-circle' };
                const c = colors[found.status];
                iconBox.className = `mx-auto mb-4 w-20 h-20 rounded-full flex items-center justify-center bg-${c}-100 text-${c}-600`;
                iconBox.innerHTML = `<i data-lucide="${icons[found.status]}" class="w-10 h-10 ${found.status === '待批核' ? 'animate-spin' : ''}"></i>`;
                title.innerText = found.status === '待批核' ? "批核中..." : (found.status === '已批准' ? "申請已批准！" : "申請被拒絕");
                details.innerHTML = `<p><b>流水號:</b> ${found.id}</p><p><b>申請人:</b> ${found.reqName}</p><p><b>對調人:</b> ${found.partName}</p>`;
            }
            lucide.createIcons();
            statusModal.style.display = 'flex';
        }

        window.closeScanModal = () => { if (html5QrCode) { html5QrCode.stop().finally(() => { document.getElementById('scanModal').style.display = 'none'; html5QrCode = null; }); } else document.getElementById('scanModal').style.display = 'none'; };
        window.saveAndRender = () => { localStorage.setItem('local_duty_data_v4', JSON.stringify(allRequests)); renderAdminTable(); updateBadge(); };
        window.renderAdminTable = () => {
            const tbody = document.getElementById('adminDataTable');
            tbody.innerHTML = allRequests.length ? allRequests.map(r => `
                <tr class="hover:bg-blue-50/30 border-b">
                    <td class="px-6 py-4">
                        <div class="font-black text-gray-800">${r.reqName} <span class="text-[10px] text-gray-400 font-normal">(${r.reqPos})</span></div>
                        <div class="text-[10px] text-blue-600 font-bold mt-0.5">${r.reqDate} <span class="text-gray-400">(${r.reqOldShift}→${r.reqNewShift})</span></div>
                    </td>
                    <td class="px-6 py-4 text-right">
                        <div class="font-black text-gray-800">${r.partName} <span class="text-[10px] text-gray-400 font-normal">(${r.partPos})</span></div>
                        <div class="text-[10px] text-orange-600 font-bold mt-0.5">${r.partDate} <span class="text-gray-400">(${r.partOldShift}→${r.partNewShift})</span></div>
                    </td>
                    <td class="px-6 py-4 text-center">
                        <span class="text-[10px] font-black ${r.status === '已批准' ? 'text-emerald-500' : (r.status === '已拒絕' ? 'text-red-500' : 'text-blue-500')}">${r.status}</span>
                        <div class="mt-2 flex justify-center gap-1">
                            ${r.status === '待批核' ? `
                                <button onclick="updateStatus('${r.id}', '已批准')" class="p-1.5 bg-emerald-50 text-emerald-600 rounded-lg"><i data-lucide="check" class="w-3 h-3"></i></button>
                                <button onclick="updateStatus('${r.id}', '已拒絕')" class="p-1.5 bg-red-50 text-red-600 rounded-lg"><i data-lucide="x" class="w-3 h-3"></i></button>
                            ` : `<button onclick="deleteRow('${r.id}')" class="text-gray-300 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>`}
                        </div>
                    </td>
                </tr>
            `).join('') : '<tr><td colspan="3" class="py-20 text-center text-gray-300">暫無申請</td></tr>';
            lucide.createIcons();
        };

        window.exportToExcel = () => {
            if (!allRequests.length) return;
            const ws = XLSX.utils.json_to_sheet(allRequests);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Records");
            XLSX.writeFile(wb, `DutySwap_${new Date().getTime()}.xlsx`);
        };

        window.updateStatus = (id, s) => { allRequests = allRequests.map(r => r.id === id ? {...r, status: s} : r); saveAndRender(); };
        window.deleteRow = (id) => { if(confirm("確定刪除？")) { allRequests = allRequests.filter(r => r.id !== id); saveAndRender(); } };
        window.switchTab = (t) => {
            document.getElementById('sectionApply').classList.toggle('hidden', t !== 'apply');
            document.getElementById('sectionAdmin').classList.toggle('hidden', t === 'apply');
            document.getElementById('tabApply').classList.toggle('tab-active', t === 'apply');
            document.getElementById('tabAdmin').classList.toggle('tab-active', t !== 'apply');
        };
        window.requestAdminAccess = () => document.getElementById('passwordModal').style.display = 'flex';
        window.verifyPassword = () => { if (document.getElementById('adminPassword').value === "1234") { document.getElementById('passwordModal').style.display='none'; switchTab('admin'); } else alert("密碼錯誤"); };
        window.updateBadge = () => { const count = allRequests.filter(r => r.status === '待批核').length; const b = document.getElementById('pendingBadge'); b.innerText = count; b.classList.toggle('hidden', count === 0); };
        window.showAlert = (t, d) => { document.getElementById('alertTitle').innerText = t; document.getElementById('alertDesc').innerText = d; document.getElementById('alertModal').style.display = 'flex'; };
        window.closeAlert = () => document.getElementById('alertModal').style.display = 'none';
        window.closeStatusModal = () => document.getElementById('statusModal').style.display = 'none';
        window.closeShareModal = () => document.getElementById('shareModal').style.display = 'none';
        window.closePasswordModal = () => document.getElementById('passwordModal').style.display = 'none';
        window.copyShareCode = () => { const el = document.createElement('textarea'); el.value = currentShareCode; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el); showAlert("已複製", "可傳送代碼。"); };
        window.whatsappShare = () => { window.open(`https://wa.me/?text=${encodeURIComponent(currentShareCode)}`, '_blank'); };

        document.addEventListener('DOMContentLoaded', () => { renderAdminTable(); updateBadge(); });
    </script>
</body>
</html>
